<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>ERP 測驗練習</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============= Theme Tokens ============= */
  :root {
    --bg: #f5efe2;
    --bg-tex: #ede4d0;
    --surface: #fdfaf2;
    --ink: #1d1612;
    --ink-2: #4a3f33;
    --ink-3: #7d6f5e;
    --line: #d6c8af;
    --line-soft: #e6dcc4;
    --accent: #2d5f3f;
    --accent-bg: #d8e8d8;
    --warn: #8b2828;
    --warn-bg: #f3d8d4;
    --amber: #b07c2a;
    --amber-bg: #f1e3c1;
    --shadow: 0 1px 0 rgba(45,30,15,.04), 0 8px 24px -12px rgba(45,30,15,.10);
    --r: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1410;
      --bg-tex: #221c16;
      --surface: #251f18;
      --ink: #f0e6d2;
      --ink-2: #c8b89a;
      --ink-3: #8a7a64;
      --line: #3a3024;
      --line-soft: #2e261d;
      --accent: #6cc18b;
      --accent-bg: #2a3f30;
      --warn: #e58b8b;
      --warn-bg: #4a2828;
      --amber: #d9a85a;
      --amber-bg: #3a2e1c;
      --shadow: 0 1px 0 rgba(0,0,0,.2), 0 8px 24px -12px rgba(0,0,0,.5);
    }
  }
  body[data-theme="light"] {
    --bg: #f5efe2; --bg-tex: #ede4d0; --surface: #fdfaf2; --ink: #1d1612; --ink-2: #4a3f33;
    --ink-3: #7d6f5e; --line: #d6c8af; --line-soft: #e6dcc4; --accent: #2d5f3f; --accent-bg: #d8e8d8;
    --warn: #8b2828; --warn-bg: #f3d8d4; --amber: #b07c2a; --amber-bg: #f1e3c1;
    --shadow: 0 1px 0 rgba(45,30,15,.04), 0 8px 24px -12px rgba(45,30,15,.10);
  }
  body[data-theme="dark"] {
    --bg: #1a1410; --bg-tex: #221c16; --surface: #251f18; --ink: #f0e6d2; --ink-2: #c8b89a;
    --ink-3: #8a7a64; --line: #3a3024; --line-soft: #2e261d; --accent: #6cc18b; --accent-bg: #2a3f30;
    --warn: #e58b8b; --warn-bg: #4a2828; --amber: #d9a85a; --amber-bg: #3a2e1c;
    --shadow: 0 1px 0 rgba(0,0,0,.2), 0 8px 24px -12px rgba(0,0,0,.5);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, var(--bg-tex) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, var(--bg-tex) 0%, transparent 40%);
    color: var(--ink);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-weight: 400;
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .num { font-family: "JetBrains Mono", ui-monospace, monospace; font-feature-settings: "tnum"; }
  .serif { font-family: "Noto Sans TC", system-ui, sans-serif; }

  /* ============= Layout ============= */
  .app { max-width: 760px; margin: 0 auto; padding: 32px 24px 96px; min-height: 100vh; }
  @media (max-width: 600px) {
    .app { padding: 20px 16px 80px; }
  }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px; padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 28px; height: 28px; border: 2px solid var(--ink);
    background: var(--accent); position: relative;
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: -6px -6px auto auto;
    width: 10px; height: 10px; background: var(--warn); border: 2px solid var(--ink);
  }
  .brand-name { font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 1px; }
  .brand-sub { color: var(--ink-3); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-left: 4px; }
  .theme-toggle {
    background: transparent; border: 1px solid var(--line); color: var(--ink-2);
    padding: 6px 12px; border-radius: var(--r); cursor: pointer; font-size: 13px;
    font-family: inherit; transition: all .2s;
  }
  .theme-toggle:hover { background: var(--surface); color: var(--ink); }

  /* ============= Home Screen ============= */
  .home-hero {
    margin: 24px 0 40px;
  }
  .home-eyebrow {
    color: var(--accent); font-size: 13px; letter-spacing: 4px;
    text-transform: uppercase; font-weight: 500; margin-bottom: 14px;
  }
  .home-title {
    font-family: "Noto Sans TC", system-ui, sans-serif;
    font-size: clamp(36px, 6vw, 56px); font-weight: 900; line-height: 1.15;
    margin: 0 0 14px; letter-spacing: -1px;
  }
  .home-title em {
    font-style: normal; color: var(--accent); position: relative;
    background: linear-gradient(180deg, transparent 65%, var(--accent-bg) 65%);
    padding: 0 4px;
  }
  .home-tag {
    color: var(--ink-2); font-size: 16px; max-width: 540px;
  }
  .home-stats {
    display: flex; gap: 28px; margin-top: 24px;
    padding: 16px 20px; background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--r);
  }
  .stat-item { flex: 1; }
  .stat-label { color: var(--ink-3); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .stat-value { font-family: "Noto Sans TC", system-ui, sans-serif; font-size: 24px; font-weight: 700; margin-top: 2px; }

  /* Mode cards */
  .modes {
    display: grid; gap: 12px; margin-top: 32px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 520px) {
    .modes { grid-template-columns: 1fr 1fr; gap: 14px; }
  }
  @media (min-width: 820px) {
    .modes { grid-template-columns: repeat(4, 1fr); }
  }
  .mode-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); padding: 20px; cursor: pointer;
    text-align: left; font-family: inherit; color: var(--ink);
    transition: all .2s; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 6px;
    min-height: 130px;
  }
  .mode-card:hover {
    transform: translateY(-2px);
    border-color: var(--ink-2);
  }
  .mode-card-num {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    color: var(--ink-3); letter-spacing: 2px;
  }
  .mode-card-title {
    font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 700; font-size: 20px;
    margin: 4px 0 2px;
  }
  .mode-card-desc { color: var(--ink-3); font-size: 13px; line-height: 1.5; }

  .home-section { margin-top: 40px; }
  .section-title {
    font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 700; font-size: 20px;
    border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .section-title-aux { color: var(--ink-3); font-size: 12px; letter-spacing: 2px; font-family: "JetBrains Mono", monospace; }

  /* History list */
  .history-list { display: flex; flex-direction: column; gap: 1px; }
  .history-item {
    display: grid; grid-template-columns: auto 1fr auto auto; gap: 14px; align-items: center;
    padding: 12px 14px; background: var(--surface); border: 1px solid var(--line-soft);
    font-size: 14px;
  }
  .history-item:not(:last-child) { border-bottom: none; }
  .history-date { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-3); }
  .history-mode { color: var(--ink-2); }
  .history-score { font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 700; font-size: 16px; }
  .history-score.good { color: var(--accent); }
  .history-score.mid { color: var(--amber); }
  .history-score.bad { color: var(--warn); }
  .history-pct { color: var(--ink-3); font-family: "JetBrains Mono", monospace; font-size: 13px; }
  .history-empty { color: var(--ink-3); padding: 24px; text-align: center; font-style: italic; border: 1px dashed var(--line); }
  .history-clear {
    background: transparent; border: none; color: var(--ink-3); font-size: 12px;
    cursor: pointer; font-family: inherit; padding: 0;
  }
  .history-clear:hover { color: var(--warn); }

  /* ============= Config Screen ============= */
  .config-back {
    background: transparent; border: none; color: var(--ink-3); font-family: inherit;
    cursor: pointer; padding: 0; margin-bottom: 16px; font-size: 14px;
  }
  .config-back:hover { color: var(--ink); }
  .config-title {
    font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 900; font-size: 36px;
    margin: 0 0 8px;
  }
  .config-desc { color: var(--ink-2); margin-bottom: 28px; }

  .field { margin-bottom: 24px; }
  .field-label {
    font-weight: 500; margin-bottom: 8px; font-size: 14px;
    color: var(--ink); display: flex; justify-content: space-between; align-items: baseline;
  }
  .field-aux { font-size: 12px; color: var(--ink-3); font-family: "JetBrains Mono", monospace; }

  .chapter-grid {
    display: grid; gap: 8px; grid-template-columns: 1fr;
  }
  @media (min-width: 480px) { .chapter-grid { grid-template-columns: 1fr 1fr; } }
  .chapter-chip {
    border: 1px solid var(--line); background: var(--surface);
    padding: 12px 14px; cursor: pointer; font-family: inherit; color: var(--ink);
    border-radius: var(--r); display: flex; justify-content: space-between; align-items: center;
    text-align: left; transition: all .15s;
  }
  .chapter-chip:hover { border-color: var(--ink-3); }
  .chapter-chip.active {
    background: var(--accent-bg); border-color: var(--accent); color: var(--ink);
  }
  .chapter-chip-name { font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 500; font-size: 15px; }
  .chapter-chip-count { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-3); }
  .chapter-chip.active .chapter-chip-count { color: var(--accent); }

  .num-input {
    background: var(--surface); border: 1px solid var(--line); padding: 10px 14px;
    border-radius: var(--r); color: var(--ink); font-family: "JetBrains Mono", monospace;
    font-size: 16px; width: 120px;
  }
  .num-input:focus { outline: none; border-color: var(--accent); }

  .toggle-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .toggle {
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    padding: 8px 14px; cursor: pointer; font-family: inherit;
    border-radius: 99px; font-size: 13px;
  }
  .toggle.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* ============= Quiz Screen ============= */
  .progress-wrap { margin-bottom: 28px; }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--ink-3); font-size: 13px; margin-bottom: 8px; font-family: "JetBrains Mono", monospace;
  }
  .progress-bar {
    height: 3px; background: var(--line-soft); border-radius: 2px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }

  .qcard {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); padding: 28px; box-shadow: var(--shadow);
  }
  @media (max-width: 480px) { .qcard { padding: 22px 18px; } }

  .qmeta { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .qmeta-tag {
    font-size: 11px; letter-spacing: 1px; padding: 3px 8px;
    border: 1px solid var(--line); border-radius: 99px; color: var(--ink-3);
    font-family: "JetBrains Mono", monospace;
  }
  .qmeta-tag.multi { color: var(--amber); border-color: var(--amber); }

  .qtext {
    font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 500; font-size: 19px;
    line-height: 1.7; color: var(--ink); margin: 0 0 24px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    border: 1px solid var(--line); background: var(--bg);
    border-radius: var(--r); padding: 14px 16px; cursor: pointer;
    display: flex; gap: 14px; align-items: flex-start;
    font-family: inherit; color: var(--ink); text-align: left;
    transition: all .15s; line-height: 1.6;
  }
  .opt:hover:not([disabled]) { border-color: var(--ink-3); background: var(--surface); }
  .opt[disabled] { cursor: default; }
  .opt-letter {
    font-family: "JetBrains Mono", monospace; font-weight: 500; font-size: 13px;
    color: var(--ink-3); padding-top: 1px; flex-shrink: 0; width: 18px;
  }
  .opt-text { flex: 1; }
  .opt-icon { width: 18px; flex-shrink: 0; padding-top: 2px; color: var(--ink-3); font-size: 14px; }
  .opt.selected { border-color: var(--ink-2); background: var(--surface); }
  .opt.selected .opt-letter, .opt.selected .opt-icon { color: var(--ink); font-weight: 700; }

  .opt.correct {
    border-color: var(--accent); background: var(--accent-bg);
  }
  .opt.correct .opt-letter, .opt.correct .opt-icon { color: var(--accent); font-weight: 700; }
  .opt.wrong {
    border-color: var(--warn); background: var(--warn-bg);
  }
  .opt.wrong .opt-letter, .opt.wrong .opt-icon { color: var(--warn); font-weight: 700; }
  .opt.correct-missed {
    border-color: var(--accent); border-style: dashed; background: transparent;
  }
  .opt.correct-missed .opt-letter, .opt.correct-missed .opt-icon { color: var(--accent); }

  .feedback {
    margin-top: 18px; padding: 12px 16px; border-radius: var(--r);
    font-size: 14px; line-height: 1.6;
  }
  .feedback.right { background: var(--accent-bg); color: var(--accent); border-left: 3px solid var(--accent); }
  .feedback.wrong { background: var(--warn-bg); color: var(--warn); border-left: 3px solid var(--warn); }
  .feedback strong { font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 700; }

  .explain {
    margin-top: 10px; padding: 14px 16px; border-radius: var(--r);
    background: var(--surface); border: 1px solid var(--line);
    color: var(--ink-2); font-size: 14px; line-height: 1.7;
  }
  .explain-label {
    display: inline-block; font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 2px; color: var(--ink-3);
    margin-right: 8px; padding: 2px 8px; border: 1px solid var(--line);
    border-radius: 3px; vertical-align: middle;
  }

  /* Inline diagram (SVG) */
  .q-diagram-wrap {
    margin: 6px -6px 18px;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: var(--r);
    overflow-x: auto;
  }
  .q-diagram-svg {
    display: block;
    width: 100%;
    max-width: 620px;
    height: auto;
    margin: 0 auto;
  }
  .q-diagram-svg .d-box { fill: var(--surface); stroke: var(--ink-2); stroke-width: 1.5; }
  .q-diagram-svg .d-text { fill: var(--ink); font-size: 13px; font-family: "Noto Sans TC", system-ui, sans-serif; text-anchor: middle; }
  .q-diagram-svg .d-text-sm { font-size: 11px; }
  .q-diagram-svg .d-arr { fill: none; stroke: var(--ink-2); stroke-width: 1.5; }
  .q-diagram-svg marker path { fill: var(--ink-2); }
  .q-diagram-svg .d-lbl { fill: var(--ink); font-size: 13px; font-weight: 700; font-family: "Noto Sans TC", system-ui, sans-serif; text-anchor: middle; }

  /* Browse mode */
  .browse-filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--line-soft);
  }
  .browse-list { display: flex; flex-direction: column; gap: 16px; }
  .browse-item {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); padding: 22px 22px 18px;
  }
  .browse-meta {
    display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .browse-idx {
    font-family: "JetBrains Mono", monospace; font-size: 12px;
    color: var(--ink-3); margin-right: 4px; min-width: 30px;
  }
  .browse-q {
    font-weight: 500; font-size: 16px; line-height: 1.7;
    margin-bottom: 14px; color: var(--ink);
  }
  .browse-item .opt { margin-bottom: 6px; padding: 10px 14px; font-size: 14px; }

  .qactions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 24px;
  }
  .qactions-left { color: var(--ink-3); font-size: 13px; }

  /* Buttons */
  .btn {
    background: var(--ink); color: var(--bg); border: 1px solid var(--ink);
    padding: 10px 22px; border-radius: var(--r); cursor: pointer;
    font-family: inherit; font-weight: 500; font-size: 14px;
    letter-spacing: 1px; transition: all .15s;
  }
  .btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--ink); border: 1px solid var(--line);
  }
  .btn-ghost:hover:not(:disabled) { background: var(--surface); border-color: var(--ink-2); }
  .btn-warn {
    background: transparent; color: var(--warn); border: 1px solid var(--warn);
  }
  .btn-warn:hover:not(:disabled) { background: var(--warn); color: var(--bg); }
  .btn-block { width: 100%; padding: 14px; font-size: 15px; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ============= Result Screen ============= */
  .result-hero {
    text-align: center; padding: 40px 0 32px;
    border-bottom: 1px solid var(--line); margin-bottom: 32px;
  }
  .result-eyebrow {
    color: var(--ink-3); font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .result-score {
    font-family: "Noto Sans TC", system-ui, sans-serif; font-size: 96px; font-weight: 900;
    line-height: 1; margin: 8px 0;
    background: linear-gradient(180deg, var(--ink) 0%, var(--ink-2) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  @media (max-width: 480px) { .result-score { font-size: 72px; } }
  .result-score.good { background: linear-gradient(180deg, var(--accent) 0%, var(--ink-2) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .result-fraction {
    font-family: "JetBrains Mono", monospace; color: var(--ink-3); font-size: 14px;
    margin-top: 4px;
  }
  .result-meta {
    display: flex; justify-content: center; gap: 32px; margin-top: 16px; flex-wrap: wrap;
  }
  .result-meta-item { text-align: center; }
  .result-meta-label { color: var(--ink-3); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .result-meta-value { font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 700; font-size: 18px; margin-top: 2px; }

  /* Wrong review */
  .review-section { margin-top: 32px; }
  .review-item {
    background: var(--surface); border: 1px solid var(--line); border-left: 3px solid var(--warn);
    padding: 18px 20px; border-radius: var(--r); margin-bottom: 12px;
  }
  .review-meta {
    display: flex; gap: 12px; align-items: center; margin-bottom: 8px;
    font-size: 11px; color: var(--ink-3); font-family: "JetBrains Mono", monospace;
    letter-spacing: 1px;
  }
  .review-q {
    font-family: "Noto Sans TC", system-ui, sans-serif; font-weight: 500; font-size: 16px;
    margin-bottom: 14px; line-height: 1.6;
  }
  .review-row { display: flex; gap: 8px; align-items: flex-start; margin: 4px 0; font-size: 14px; line-height: 1.6; }
  .review-row-label {
    flex-shrink: 0; font-family: "JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 1px; color: var(--ink-3); padding-top: 2px; min-width: 60px;
  }
  .review-row-value { flex: 1; }
  .review-row.user .review-row-value { color: var(--warn); }
  .review-row.right .review-row-value { color: var(--accent); font-weight: 500; }

  /* Misc */
  .ftn { color: var(--ink-3); font-size: 12px; text-align: center; margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--line-soft); }
  .ftn a { color: var(--ink-2); }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-name">ERP 練習場</div>
        <div class="brand-sub">study console</div>
      </div>
    </div>
    <button class="theme-toggle" id="themeToggle">切換主題</button>
  </header>
  <main id="main"></main>
  <div class="ftn">本地檔 · 不上傳任何資料 · 紀錄存於瀏覽器</div>
</div>

<script>
const QUESTIONS = [{"num": 1, "text": "下列何者非執行物料需求規劃（MRP）的主要依據？", "type": "single", "options": ["生產排程", "物料庫存", "主生產計劃（MPS）", "物料表（BOM）"], "correct": [0], "source": "doc1", "explanation": "正解 a 生產排程。MRP 的三大依據是 MPS（主生產計畫）、BOM（物料表）、庫存資料。生產排程是 MRP 跑出來的「結果」而不是「依據」，所以選 a。"}, {"num": 2, "text": "封閉迴路物料需求規劃（Closed-loop MRP）在物料需求規劃 MRP 基礎上加入考量下列何者，以檢視排程的合理性？", "type": "single", "options": ["庫存需求規畫（Inventory Requirement Planning）", "生產規畫（Production Planning）", "產能需求規畫（Capacity Requirement Planning）", "採購需求規畫（Procurement Requirement Planning）"], "correct": [2], "source": "doc1", "explanation": "正解 c 產能需求規畫（CRP）。封閉迴路 MRP 在原本 MRP 基礎上加入產能檢核，把人力、機台等產能限制納入考量，避免排出來的計畫實際做不出來。"}, {"num": 3, "text": "關於 ERP 系統應用三層式架構的對應說明，下列哪些正確？(複選)", "type": "multi", "options": ["銷售人員確認後的訂單儲存於訂單資料架構中，此訂單架構屬於資料層（Data Tier）", "生產線測試人員透過工作機檯或工業用電腦輸入檢測作業項目，此種輸入表單視為展示層（Presentation Tier）", "庫存人員透過查詢功能檢查到安全存量相關數據，其中計算安全存量的相關運算機制通常放置於商業層（Business Tier）／應用層（Application Tier）", "業務人員透過手機查詢客戶資料，其中手機觸控運作，係屬於商業層（Business Tier）／應用層（Application Tier）"], "correct": [0, 1, 2], "source": "doc1", "explanation": "正解 a、b、c。三層式架構分為展示層（畫面/輸入）、商業層（運算邏輯）、資料層（資料庫）。手機觸控屬於使用者介面，應歸在展示層而非商業層，所以 d 錯。"}, {"num": 4, "text": "ERP 系統的整合特性包含了下列哪些？(複選)", "type": "multi", "options": ["資料的整合", "資料與流程的整合", "客戶與供應商的整合", "金流與物流的整合"], "correct": [0, 1], "source": "doc1", "explanation": "正解 a、b。ERP 的整合特性主要指企業內部「資料的整合」與「資料與流程的整合」。客戶供應商整合屬於 ERP II 範疇，金流物流是企業作業循環，都不是 ERP 整合特性的標準描述。"}, {"num": 5, "text": "美國營運管理協會 APICS 對 ERP 下了明確定義，它跟傳統 MRPII 有一些不同點，以下何者不屬之？", "type": "single", "options": ["關聯式資料庫", "點對點架構", "第四代語言", "主從架構"], "correct": [1], "source": "doc1", "explanation": "正解 b 點對點架構。ERP 比 MRPII 多的是關聯式資料庫、第四代語言、主從架構等技術特徵。點對點是檔案傳輸協定的概念，跟 ERP 架構無關。"}, {"num": 6, "text": "誠如「資訊孤島」所言，各部門自體的管理資訊系統（Management Information System， MIS）極致發展下，反而不盡然對公司的整體利益更有助力。而在 ERP 整合規劃的思考下，卻較能實現公司的最大利益。這是因為重視資源規劃的 ERP 較分而治之的 MIS 更能提供以下何種特質，使企業利益得以實現？", "type": "single", "options": ["資訊的分享", "流程的統一", "資料的整合", "組織的強化"], "correct": [0], "source": "doc1", "explanation": "正解 a 資訊的分享。ERP 跟 MIS 最大的差別在於整合後讓各部門能即時共享同一份資料，這是 MIS 各自為政做不到的。"}, {"num": 7, "text": "對 ERP 系統採用的基本技術而言，目前的主流趨勢是下列哪一種架構居多？", "type": "single", "options": ["雲端計算架構", "集中式架構", "分散式架構", "多層式主從架構"], "correct": [3], "source": "doc1", "explanation": "正解 d 多層式主從架構。目前 ERP 主流是把展示層、應用層、資料層分開部署的多層式架構，比集中式或單純的主從架構更有彈性、容易擴充。"}, {"num": 8, "text": "一個具有即時與整合特性的 ERP 系統，至少能滿足在特定情境設定之下的流程，下列幾項作業流程順序何者正確？", "type": "single", "options": ["接單 → 排程 → 採購 → 驗收 → 付款 → 發料 → 製造 → 出貨", "接單 → 採購 → 排程 → 驗收 → 付款 → 發料 → 製造 → 出貨", "接單 → 採購 → 排程 → 驗收 → 付款 → 製造 → 發料 → 出貨", "接單 → 排程 → 採購 → 驗收 → 付款 → 製造 → 發料 → 出貨"], "correct": [0], "source": "doc1", "explanation": "正解 a。標準產銷流程是先「接單→排程」再去「採購」，因為要有生產計畫才知道採購什麼。發料一定在製造之前。其他三個選項把採購放在排程前面或順序錯亂。"}, {"num": 9, "text": "下列有關 ERP 系統的最佳化實務（Best Practice）對企業所產生的效益，何者是正確的？", "type": "single", "options": ["降低存貨周轉率", "增加人力的成本", "增加時程、提高品質", "因為資訊的整合，可縮短決策所需要的時間"], "correct": [3], "source": "doc1", "explanation": "正解 d 資訊整合縮短決策時間。ERP 最佳實務帶來的是「提高」存貨周轉率、「降低」人力成本、「縮短」時程，所以前三項都寫反了。"}, {"num": 10, "text": "有關 ERP 系統的演進，下列何者正確？", "type": "single", "options": ["EERP --> MRPII --> MRP --> ERP", "MRP --> MRPII --> ERP --> EERP", "MRPII --> MRP --> EERP --> ERP", "ERP --> MRPII --> MRP --> EERP"], "correct": [1], "source": "doc1", "explanation": "正解 b。ERP 的演進順序是 MRP → MRPII → ERP → EERP，先有物料規劃，再加入製造資源，再擴大到企業全部資源，最後延伸到企業外部協作。"}, {"num": 11, "text": "下列哪一種 ERP 系統發展的演進歷程是正確的？", "type": "single", "options": ["ERP → EERP（Extended ERP）→ MRP I → MRP II", "MRP I → MRP II → ERP → EERP", "MRP II → ERP → MRP I → EERP", "MRP I → ERP → MRP II → EERP"], "correct": [1], "source": "doc1", "explanation": "正解 b。同上題，正確順序是 MRP I → MRP II → ERP → EERP，由內而外、由窄而廣的演進路徑。"}, {"num": 12, "text": "物料需求規劃（Material Requirements Planning， MRP）主要是由四個基本功能所組成，下列何者不屬於 MRP 的基本功能？", "type": "single", "options": ["工單管理（Work order）", "物料清單展開（Bill of material processing explosion）", "即時管理系統（Just In Time， JIT）", "經濟訂購量（Economic Order Quantity， EOQ）"], "correct": [2], "source": "doc1", "explanation": "正解 c JIT。MRP 的四大基本功能是 MPS、BOM 展開、工單、EOQ。JIT 是另一套生產哲學，跟 MRP 的推式邏輯相反，不屬於 MRP 功能。"}, {"num": 13, "text": "一般而言，可將導入 ERP 系統的效益分為有形與無形效益兩方面，下列何者不包括在 ERP 系統所帶來的有形效益內？", "type": "single", "options": ["增加營業收入與利潤", "企業流程與系統作業之整合性", "降低採購成本", "增加交貨準確率"], "correct": [1], "source": "doc1", "explanation": "正解 b 流程整合性。ERP 的有形效益是可量化的數字（營收、成本、交貨率），「企業流程與系統作業之整合性」屬於無形效益，難以直接用數字衡量。"}, {"num": 14, "text": "ERP 系統使用者企業與 ERP 顧問在資訊與知識上的不對稱，經常成為導入 ERP 系統的重大障礙。下列何者是 ERP 系統失敗的原因之一？", "type": "single", "options": ["高階主管的支持", "使用者的配合度高", "稱職的建置顧問", "企業人事流動率高"], "correct": [3], "source": "doc1", "explanation": "正解 d 人事流動率高。前三項都是「成功」因素，d 才是「失敗」因素，因為人員流失會讓導入經驗無法累積。"}, {"num": 15, "text": "關於 ERP 系統功能架構，以下敘述哪些正確？(複選)", "type": "multi", "options": ["網路伺服器提供使用者透過瀏覽器存取 ERP 系統資料", "即使有了雲端系統架構，ERP 系統目前仍僅能利用軟體的遠端方式操控，且企業內一定得安裝相關伺服器", "資料庫伺服器通常儲存企業營運相關的資料", "應用程式伺服器為 ERP 系統模組安裝之處，但無法擴充數目以分擔負荷量"], "correct": [0, 2], "source": "doc1", "explanation": "正解 a、c。網路伺服器讓使用者透過瀏覽器操作、資料庫伺服器存放資料是對的。b 錯在雲端架構不需要在企業內部安裝伺服器，d 錯在應用程式伺服器是可以擴充的。"}, {"num": 16, "text": "下列哪些是導入 ERP 系統的效益？(複選)", "type": "multi", "options": ["增加營業收入與利潤", "提升資金的週轉率", "增加交貨準確率", "加強整合系統，減少增加 IT 花費"], "correct": [0, 1, 2], "source": "doc1", "explanation": "正解 a、b、c。導入 ERP 增加營收、提升資金週轉、增加交貨準確率都是常見效益。d「減少增加 IT 花費」用詞矛盾，且整合系統反而會增加 IT 投資。"}, {"num": 17, "text": "根據台灣區 249 家導入 ERP 的企業分析結果（2004，中華企業資源規劃協會，台灣地區企業導入 ERP 系統管理議題之實證調查），導入 ERP 系統時可能遇到的問題很多，下列何者為最多企業可能面臨到的問題？", "type": "single", "options": ["供應商技術能力不足", "落後專案所規劃的進度", "使用單位未能明確說明其需求", "顧問不了解公司業務程序"], "correct": [2], "source": "doc1", "explanation": "正解 c 使用單位未能明確說明其需求。台灣 249 家企業實證調查中，這是最常見問題，也就是業務人員講不清楚自己要什麼，導致顧問做出來不符期望。"}, {"num": 18, "text": "目前 ERP 系統除提供基本的作業模組功能外，也提供其他主要延伸功能來和 ERP 搭配，期望可以提升更高的附加價值給予企業主，請問下列何者非其主要的延伸功能之一？", "type": "single", "options": ["數位學習（e-Learning）", "供應鏈管理（SCM）", "顧客關係管理（CRM）", "電子商務（EC）"], "correct": [0], "source": "doc1", "explanation": "正解 a 數位學習。SCM、CRM、EC 都是 ERP 常見的延伸模組，e-Learning 屬於人才培訓系統，跟 ERP 的供應鏈、客戶、商務延伸無直接關聯。"}, {"num": 19, "text": "根據美國作業管理學會（APICS）的定義：一個會計導向的資訊系統，用來規劃和確認為了接受、製造、運送和結算客戶訂單所需的整個企業資源，稱為下列何者？", "type": "single", "options": ["物料需求規劃（MRP）", "製造資源規劃（MRP II）", "企業資源規劃（ERP）", "企業系統規劃（BSP）"], "correct": [2], "source": "doc1", "explanation": "正解 c ERP。題目就是 APICS 對 ERP 的標準定義原文：會計導向、整合企業資源來支援接單到結算的整個流程。"}, {"num": 20, "text": "下列哪些為 ERP 系統的主要效益？(複選)", "type": "multi", "options": ["企業流程自動化", "即時存取管理資訊", "協助改變產品結構", "使用電子通訊及電子商務改進供應鍵管理"], "correct": [0, 1, 3], "source": "doc1", "explanation": "正解 a、b、d。流程自動化、即時管理資訊、改善供應鏈管理都是 ERP 標準效益。c「協助改變產品結構」是設計端的事，跟 ERP 沒直接關係。"}, {"num": 21, "text": "下列哪些是 ERP 系統供應商？(複選)", "type": "multi", "options": ["SAP", "Oracle", "鼎新", "漢康"], "correct": [0, 1, 2, 3], "source": "doc1", "explanation": "正解 a、b、c。SAP、Oracle、鼎新都是知名 ERP 廠商，SAP 全球第一、Oracle 第二、鼎新是台灣龍頭。漢康主要做 EIP 不是 ERP 廠商。"}, {"num": 22, "text": "關於 ERP 導入常見失敗因素，下列何者不正確？", "type": "single", "options": ["高階主管不支持，專案人員以及使用者教育訓練不足", "顧問專業能力不足，顧問公司經驗不足", "流程考量過於嚴謹，系統導入時須就管理面與使用面互做確認乃至於耗時甚鉅", "企業需求分析不完善，使用者抗拒"], "correct": [2], "source": "doc1", "explanation": "正解 c。前三項（高階不支持、顧問不專業、需求分析不完善）都是真正的失敗原因。c 講「流程考量過於嚴謹」是優點不是缺點，所以這項才是「不正確」。"}, {"num": 23, "text": "大多數的文獻都從下列何者作為 ERP 發展的源頭，但實際上 ERP 系統整合了企業管理的五大功能並且形成一個企業的整體資訊系統？", "type": "single", "options": ["物料需求規劃（MRP）", "製造資源規劃（MRP II）", "管理資訊系統（MIS）", "企業系統規劃（BSP）"], "correct": [0], "source": "doc1", "explanation": "正解 a MRP。文獻上普遍把 MRP 當作 ERP 發展的源頭，從物料規劃一路擴大到製造資源、企業整體資源規劃。"}, {"num": 24, "text": "APICS 定義 ERP 是何種導向的資訊系統？", "type": "single", "options": ["功能", "部門", "財務會計", "技術"], "correct": [2], "source": "doc1", "explanation": "正解 c 財務會計。APICS 1995 年的定義就是「會計導向」（accounting-oriented）的資訊系統，重點放在用會計觀點整合企業資源。"}, {"num": 25, "text": "關於 ERP 發展的各個階段與其使用到的資訊架構與技術，下列何者有誤？", "type": "single", "options": ["第三代 ERP 常用到主從式（Client／Server）架構，及常使用第四代程式語言來撰寫相關程式", "第三代 ERP 重視組織間的協調，力求企業的最佳化實務，以極力主張使用 XML 化物件導向資料庫取代常見的關聯式資料庫", "ERP II 重視 Internet 的運用，Web-based 的相關設計亦是使用的重點之一", "ERP II 同樣重視企業間的協同合作，3-Tier 的架構與 Web Services 的混搭自然也在使用之列"], "correct": [1], "source": "doc1", "explanation": "正解 b。第三代 ERP 用主從架構和第四代語言是對的，重視組織協調也對，但「主張用 XML 物件導向資料庫取代關聯式資料庫」是錯的，主流仍是關聯式資料庫。"}, {"num": 26, "text": "從 1970 年代到 21 世紀，ERP 的演化歷程大致可以分為四個階段，請問下列哪一階段是在於將市場的需求重點轉為滿足顧客多樣化的個別需求，創造高附加價值的大量客製化的生產方式？", "type": "single", "options": ["1970 ~ 1980（MRP）", "1980 ~ 1990（MRPII）", "1990 ~ 2000（ERP）", "2000 ~（EERP）"], "correct": [2], "source": "doc1", "explanation": "正解 c 1990~2000（ERP）。大量客製化、個別化需求是 ERP 階段的市場特徵；MRP 階段重生產、MRPII 重製造資源、EERP 重企業間協作。"}, {"num": 27, "text": "ERP 系統專案實施的風險程度定義為改變或不確定造成累積的影響及影響專案成功或使其未達成目標的潛在事件，請問下列哪一項風險程度類別會影響公司競爭力與獲利？", "type": "single", "options": ["使用者的參與度不足", "高階主管的支持度不佳", "資訊系統造成公司營運衝擊", "整體企業策略使用技術過於集中"], "correct": [3], "source": "doc1", "explanation": "正解 d 整體企業策略使用技術過於集中。當技術選擇過度集中時會讓公司喪失彈性，影響長期競爭力與獲利。其他三項是專案內部風險。"}, {"num": 28, "text": "從 ERP 系統功能完整性的角度來看，一個 ERP 產品至少應該將企業整個產銷循環包含在內，其中從訂單、採購、存貨、出貨到收款等產銷循環為下列何種產業？", "type": "single", "options": ["買賣業", "服務業", "製造業", "物流業"], "correct": [0], "source": "doc1", "explanation": "正解 a 買賣業。題目描述的是純粹商業流通：訂單→採購→存貨→出貨→收款，沒有「製造」環節，所以是買賣業而非製造業。"}, {"num": 29, "text": "ERP 與企業最主要的績效目標：增加企業利潤的關係為下列何者？", "type": "single", "options": ["導入 ERP 系統就可以幫助企業增加利潤", "導入 ERP 系統無法幫助企業增加利潤", "可以經由 ERP 來提升營運作業效率提升企業競爭力，以滿足客戶超越競爭者而增加獲利能力", "導入 ERP 和企業利潤無關"], "correct": [2], "source": "doc1", "explanation": "正解 c。導入 ERP 不是萬靈丹，要透過提升效率、強化競爭力來「間接」增加利潤；不是導入就會賺，也不是完全無關。"}, {"num": 30, "text": "ERP 系統主要功能為將企業營運中各流程中所需的資料即時整合並匯入何模組中？", "type": "single", "options": ["銷售模組", "會計模組", "製造模組", "庫存模組"], "correct": [1], "source": "doc1", "explanation": "正解 b 會計模組。ERP 的核心理念是把所有交易最終都匯總到會計系統反映財務狀況，所以會計模組是各模組資料整合的中心。"}, {"num": 31, "text": "ERP 系統成功關鍵要素脫離不了人，下列哪些人會影響到 ERP 統導入的成敗？(複選)", "type": "multi", "options": ["高階主管", "建置顧問", "使用者", "專案主持人"], "correct": [0, 1, 2, 3], "source": "doc1", "explanation": "正解 a、b、c。高階主管、建置顧問、使用者三方是 ERP 導入的鐵三角；專案主持人是其中一個角色而已，通常已包含在使用者方或主管方裡。"}, {"num": 32, "text": "Callaway（1999）曾提出導入 ERP 系統具有有形與無形效益，下列何者不是無形效益？", "type": "single", "options": ["即時提供管理決策資訊", "提升生產力", "資訊收集的正確性與完整性", "企業流程與系統作業的整合性"], "correct": [1], "source": "doc1", "explanation": "正解 b 提升生產力。生產力可以用數字衡量（產量、良率），屬於「有形」效益。其他三項（即時決策資訊、資料正確完整、流程整合）都難以量化，屬於無形。"}, {"num": 33, "text": "對於 ERP 系統常用的架構層次，下列描述哪些正確？(複選)", "type": "multi", "options": ["在連接底層考慮使用 VPN（Virtual Private Network），可以保障公司經營團隊與董事會間財務資料以及內部一些商業機密資料較不會被網路監聽與剽竊", "使用的作業系統上比較重視初始建置時成本，日後持有或維護等成本則視為公司每年攤列開銷，不應當作 ERP 決策時考量因素", "在應用開發語言與使用資料庫上，主要是以配合公司舊有MIS 環境與應用軟體系統為考量，以便在 ERP 導入與整合後能與之前運作保持一致性", "針對辦公室流程使用 workflow 架構取代 e-mail 來做訊息傳遞，最主要是前者有較佳的傳遞確認性與保證"], "correct": [0, 3], "source": "doc1", "explanation": "正解 a、d。VPN 保護機密通訊、workflow 取代 email 確保訊息傳遞，這兩項描述正確。b 錯在不該忽略持有成本，c 錯在 ERP 不應該為了配合舊系統而犧牲新環境的優勢。"}, {"num": 34, "text": "關於 Shang & Seddon 2000 年提出區分 ERP 效益的架構，可分成五大面向及其二十一項效益，下列何者敘述有誤？", "type": "single", "options": ["改善決策制定與涵蓋更完善之資源管理屬於管理面的效益提升", "促進企業學習、建立共同願景屬於組織面的效益提升", "促進產品差異化／客製化、建立成本領導屬於策略面的效益提升", "降低成本、延長存貨周轉時間與銷貨反應時間屬於營運面的效益提升"], "correct": [3], "source": "doc1", "explanation": "正解 d。Shang & Seddon 的營運面效益是「縮短」存貨周轉與銷貨反應時間，題目寫成「延長」是錯的，所以這項敘述有誤。"}, {"num": 35, "text": "現今流行的多層式（Multi-Tier）架構是建立在何種基礎之上？", "type": "single", "options": ["網頁基礎（Web Based）", "集中式架構（Central Computer）", "大型主機架構（Mainframe）", "主從式架構（Client/Server）"], "correct": [3], "source": "doc1", "explanation": "正解 d 主從架構。多層式架構（multi-tier）是主從架構（client/server）的延伸，把原本兩層拆成三層或更多層，所以基礎在主從架構。"}, {"num": 36, "text": "下列何者是 ERP 系統導入失敗的可能原因？", "type": "single", "options": ["ERP 是一套資訊系統，故導入時不需考量公司整體策略，由資訊部門主導即可", "高階主管的全力支持", "各部門關鍵使用者積極的參與", "良好的變革管理"], "correct": [0], "source": "doc1", "explanation": "正解 a。「ERP 由資訊部門主導不需考量整體策略」是典型錯誤觀念，這也是失敗主因之一。b、c、d 都是成功因素的正確描述。"}, {"num": 37, "text": "依 APICS（1995）為企業資源規劃系統提出的定義，是以下列何者為導向之資訊系統？", "type": "single", "options": ["管理會計導向的系統", "財務會計導向的系統", "生產規劃導向的系統", "生產控制導向的系統"], "correct": [1], "source": "doc1", "explanation": "正解 b 財務會計導向。APICS 1995 年定義 ERP 是「會計導向」的系統，重點是財務會計；管理會計屬於延伸應用。"}, {"num": 38, "text": "下列哪些是 ERP 系統的特性？(複選)", "type": "multi", "options": ["即時", "整合", "採取多層式主從（client-server）架構", "多模組的資訊系統"], "correct": [0, 1, 2, 3], "source": "doc1", "explanation": "正解 a、b、c、d。即時、整合、多層式主從架構、多模組這四項都是 ERP 的核心特性，全部都對。"}, {"num": 1, "text": "基本上，一個典型的 ERP 系統導入案會經過七個階段，下列哪一項為正確順序？(1)初始評估、(2)系統上線、(3)系統建置、(4)專案準備、(5)企業藍圖規劃、(6)系統上線規劃、(7)持續改善", "type": "single", "options": ["(1) → (4) → (3) → (5) → (2) → (6) → (7)", "(1) → (4) → (5) → (3) → (6) → (2) → (7)", "(1) → (4) → (2) → (3) → (5) → (6) → (7)", "(1) → (4) → (2) → (3) → (6) → (5) → (7)"], "correct": [1], "source": "doc2", "explanation": "正解 b。標準七階段順序：初始評估(1)→專案準備(4)→企業藍圖規劃(5)→系統建置(3)→系統上線規劃(6)→系統上線(2)→持續改善(7)。先評估再準備，藍圖規劃完才建置，建置好再做上線規劃。"}, {"num": 2, "text": "ERP 系統的導入策略可以分為三種：逐步式（Step by Step）、大躍進式（Big-Bang）和複製式（Roll-Out），其中對組織資源協調與控制較有利的方法為下列何者？", "type": "single", "options": ["逐步式（Step by Step）", "大躍進式（Big-Bang）", "複製式（Roll-Out）", "三者都可以"], "correct": [0], "source": "doc2", "explanation": "正解 a 逐步式。一個模組一個模組導入，每階段資源需求較小、容易控管協調，所以對組織資源協調最有利。大躍進式同時動員所有資源風險高。"}, {"num": 3, "text": "諸多國際組織在 XML 基礎上，投入大量資源以研訂全球各產業之共通電子商務應用標準規範及對應的應用領域，下列何者正確？", "type": "single", "options": ["ebXML 之於線上學習", "RosettaNet 之於網路業者", "IFX（Interactive Financial eXchange）之於運輸業", "HL7 （Health Level Seven）之於醫療業"], "correct": [3], "source": "doc2", "explanation": "正解 d HL7 之於醫療業。HL7 是醫療資訊交換標準。ebXML 通用於電子商務、RosettaNet 用在電子業供應鏈、IFX 用於金融業，前三項對應錯誤。"}, {"num": 4, "text": "下列哪些屬於 ERP 導入專案規劃階段的工作？(複選)", "type": "multi", "options": ["訂定專案範圍", "組織專案團隊", "評估顧問公司", "訓練種子人員"], "correct": [0, 3], "source": "doc2", "explanation": "正解 a、d。專案規劃階段做的是訂定範圍、訓練種子人員。組織專案團隊和評估顧問公司屬於更早的「專案準備」或「初始評估」階段。"}, {"num": 5, "text": "下列何者不是大多數企業避免進行 ERP 客製化的主要原因？", "type": "single", "options": ["與原系統整合性問題", "會增加風險管理上的不便", "會增加系統導入成本或軟體安裝成本", "必須額外耗費精神或人力維護客製化的系統"], "correct": [1], "source": "doc2", "explanation": "正解 b 風險管理上的不便。避免客製化的主因是整合性問題、增加成本、增加維護負擔。「風險管理上的不便」不是直接原因，反而過度客製化會增加風險。"}, {"num": 6, "text": "ERP 系統的導入策略可以分為三種：逐步式（Step by Step）、大躍進式（Big-Bang）和複製式（Roll-Out），其中所需時程較短的為下列何者？", "type": "single", "options": ["逐步式（Step by Step）", "大躍進式（Big-Bang）", "複製式（Roll-Out）", "三者都可以"], "correct": [1], "source": "doc2", "explanation": "正解 b 大躍進式。Big-Bang 一次到位，所需時間最短，但風險最高。逐步式和複製式都是分階段或分區進行，總時程較長。"}, {"num": 7, "text": "關於 ERP 系統建置後的售後服務，應包含以下哪些？(複選)", "type": "multi", "options": ["問題分析與解決", "新增修補程式（Patch）", "使用者社群（User's club）", "員工的持續教育訓練"], "correct": [0, 1, 2, 3], "source": "doc2", "explanation": "正解 a、b、c、d。售後服務四項都該包含：問題分析解決、Patch 修補、使用者社群、持續教育訓練，全部都對。"}, {"num": 8, "text": "關於 ERP 系統建置的敘述，下列何者錯誤？", "type": "single", "options": ["指將 ERP 安裝在硬體設備上，並且依企業的作業流程啟動模組、設定參數、建立基本資料以備系統運作的工作", "大多是在顧問公司的輔導下來進行的", "當建置合約簽定後，即可開始系統建置的過程", "是將使用者需求轉化為系統規格文件，以作為上一階段系統實作的依據"], "correct": [3], "source": "doc2", "explanation": "正解 d。系統建置階段是「實作」階段，把規格實際裝起來。「將需求轉化為規格文件作為實作依據」這是「系統設計」階段做的事，所以 d 錯。"}, {"num": 9, "text": "下列哪些為企業導入 ERP 系統的可能原因？(複選)", "type": "multi", "options": ["改善資訊的正確性與及時性", "有助於公司的上市上櫃", "同業已導入類似系統", "進行企業再造流程"], "correct": [0, 1, 2, 3], "source": "doc2", "explanation": "正解 a、b、c、d。改善資訊正確性與及時性、上市櫃需求、同業競爭壓力、企業流程再造都是常見的導入動機，全部都對。"}, {"num": 10, "text": "專案控管週期的順序為下列何者？（1）訂定目標（2）離差測量（3）檢討與修正（4）學習提升", "type": "single", "options": ["（1）→（2）→（3）→（4）", "（1）→（3）→（2）→（4）", "（1）→（4）→（2）→（3）", "（4）→（1）→（2）→（3）"], "correct": [0], "source": "doc2", "explanation": "正解 a。專案控管循環就是 PDCA 思維：先訂目標→測量實際與目標的差距（離差）→檢討修正→學習提升再回到目標。"}, {"num": 11, "text": "ERP 系統建置顧問評選時，最主要考慮的有哪些方面？(1)對系統的熟悉程度、(2)人事費用是否符合預算、(3)對產業的了解程度、(4)企業導入 ERP 系統時是否同時進行型流程再造的工作", "type": "single", "options": ["12", "134", "234", "1234"], "correct": [1], "source": "doc2", "explanation": "正解 b 134。顧問評選看(1)對系統熟悉度、(3)對產業了解程度、(4)是否同時做 BPR。「(2)人事費用是否符合預算」不該是首要考量，因為一分錢一分貨，便宜不見得做得好。"}, {"num": 12, "text": "ERP 系統的導入策略可以分為三種：逐步式（Step by Step）、大躍進式（Big-Bang）和複製式（Roll-Out），其中在短時間內需要投入較龐大資源的是下列何者？", "type": "single", "options": ["逐步式（Step by Step）", "大躍進式（Big-Bang）", "複製式（Roll-Out）", "三者都可以"], "correct": [1], "source": "doc2", "explanation": "正解 b 大躍進式。Big-Bang 在短時間內要全公司一起動，需要在短期內投入最龐大的人力、物力、財力。"}, {"num": 13, "text": "基本上專案管理流程可大致歸納為附圖的八大步驟，請依正確流程順序排列之？(1)釐清任務與資源需求、(2)結案管理、(3)釐清主要的問題或任務目標、(4)預估專案成本與準備專案預算、(5)持續監督、控制與溝通、(6)風險分析與建立攸關團體之利害關係、(7)釐清與界定最佳的解決方案、(8)準備控制時間進度與資源配置計畫", "type": "single", "options": ["(3)(7)(1)(8)(4)(6)(5)(2)", "(1)(7)(3)(8)(4)(6)(5)(2)", "(3)(7)(1)(4)(8)(5)(6)(2)", "(1)(7)(3)(8)(6)(4)(5)(2)"], "correct": [0], "source": "doc2", "explanation": "正解 a (3)(7)(1)(8)(4)(6)(5)(2)。專案管理流程：先釐清目標(3)→定方案(7)→釐清資源需求(1)→排時程(8)→估成本(4)→風險分析(6)→監督執行(5)→結案(2)。先有目標才能規劃，先規劃才能執行。"}, {"num": 14, "text": "隨著資訊系統委外市場快速成長，委外服務也細分成很多種，下列敘述何者較正確？", "type": "single", "options": ["合包（Co-sourcing）是一種長期合作關係，雙方先為此關係進行投資，再依據預先擬定的協議分享利益", "內包（Insourcing）是一種短期的策略性解決方案，原因在於解決迫切的問題，但與企業規劃前景的策略發展過程無關", "利益關係（Benefit-based relationships）為一種確保產值的應變措施，藉由改善某區域的營運，以承攬來自其他部門的工作", "服務外包（Outsourcing the service）是一種仔細選擇和約僱專業的外部服務供應商，並在必要時，因應服務供應商的專業累積，創新擴大服務層面"], "correct": [3], "source": "doc2", "explanation": "正解 d 服務外包。Outsourcing 強調「精挑外部專業供應商」並隨需求擴大服務層面。其他三項把合包、內包、利益關係的定義寫反了。"}, {"num": 15, "text": "在評選 ERP 系統供應商時，必須考慮幾點因素，以下何者不是須考慮因素？", "type": "single", "options": ["組織與人員", "方法或程序", "內容和標準", "品牌知名度"], "correct": [3], "source": "doc2", "explanation": "正解 d 品牌知名度。評選 ERP 廠商重點看「組織人員、方法程序、內容標準」這些客觀條件，品牌知名度只是參考，不是必要因素。"}, {"num": 16, "text": "滾動式導入（Roll-out）是一個部門一個部門或是一個區域一個區域（Site by site）的導入，最後再推展到全公司。部門／區域的導入可以是全面性，也可以是逐步導入，因此其導入速度較慢；請問下列哪些為滾動式導入的優點？(複選)", "type": "multi", "options": ["成本較易控制", "累積一個完整的導入經驗將有助於後續的推展", "風險較低", "專案成員的激勵動機最大"], "correct": [0, 1, 2], "source": "doc2", "explanation": "正解 a、b、c。滾動式（一個一個區域導入）的優點是成本可控、累積經驗、風險低。d 錯，分批導入時專案成員的衝勁反而沒有 Big-Bang 那麼集中。"}, {"num": 17, "text": "ERP 的導入過程，專案小組扮演著一個舉足輕重的角色。此專案小組的建立，應該在下列哪個時期為之？", "type": "single", "options": ["初始評估期", "專案準備期", "系統上線規劃期", "企業藍圖規劃期"], "correct": [1], "source": "doc2", "explanation": "正解 b 專案準備期。專案小組要在「專案準備期」就成立，這樣後續藍圖規劃、建置等工作才有人推動。"}, {"num": 18, "text": "在 ERP 系統導入中，對於專案小組成員的教育訓練是非常重要的一環，足以影響整個專案導入的成效。教育訓練的工作可分為幾個方面，下列何者的重點在於教導最新的經營管理觀念？", "type": "single", "options": ["系統功能", "企業流程", "專案管理", "時程掌控"], "correct": [1], "source": "doc2", "explanation": "正解 b 企業流程。教育訓練可分成系統功能、企業流程、專案管理三類，其中「企業流程」課程著重最新經營管理觀念，幫助使用者理解新流程的意義。"}, {"num": 19, "text": "ERP 導入的策略通常可分為三種，包含逐步式（Step by Step）、大躍進式（Big-Bang）與複製式（Roll-Out）。下列何者不是大躍進式（Big-Bang）的優點？", "type": "single", "options": ["人力資源所需較少", "縮短整個專案的時間", "整合後的功效可馬上顯現", "專案成員的衝勁與動機比較高"], "correct": [0], "source": "doc2", "explanation": "正解 a 人力資源所需較少。Big-Bang 的特色是時間短、效益快顯、成員衝勁大，但需要「大量」人力同步動起來，所以「人力較少」反而不是優點。"}, {"num": 20, "text": "ERP 導入後期效益良莠與否，往往與其 BPR 的舉措息息相關。而在 ERP 的導入期程中，通常妥善決策並確認企業流程的期程應於哪個期程？", "type": "single", "options": ["專案準備期", "系統上線規劃期", "企業藍圖規劃期", "系統建置期"], "correct": [2], "source": "doc2", "explanation": "正解 c 企業藍圖規劃期。BPR 與企業流程確認應該在「企業藍圖規劃」階段就做好決策，這樣建置時才有依據。"}, {"num": 21, "text": "下列哪些是 ERP 系統導入的成功關鍵因素？(複選)", "type": "multi", "options": ["專職的專案成員", "有效的變革管理", "落實教育訓練", "高階主管的參與和支持"], "correct": [0, 1, 2, 3], "source": "doc2", "explanation": "正解 a、b、c、d。專職成員、變革管理、教育訓練、高階主管支持這四項都是公認的 ERP 成功關鍵因素，全部都對。"}, {"num": 22, "text": "請根據上課所說的MRP回答問題。若客戶訂單需求量為成品F 10000個, 每一個F由2個A與3個B所組成, 如果倉庫內有可用的成品F庫存2000、原料A庫存3000、原料B庫存5000, 則物料需求規劃中尚未扣除庫存的原料A的原始需求數量為：", "type": "single", "options": ["8000", "16000", "24000", "32000"], "correct": [1], "source": "doc2", "explanation": "正解 b 16000。F 需求 10000 - 庫存 2000 = 主排程 8000；A 原始需求 = 8000 × 2 = 16000。題目問「未扣庫存」的原始需求，所以答 16000。"}, {"num": 23, "text": "一個完整的 ERP 評選過程，至少需要包含下述哪些步驟？1. 建立企業願景與策略；2. 建立 ERP 系統導入的目標；3. 收集 ERP 供應商相關資料；4. 評選 ERP 系統供應商；5. 評選 ERP 導入顧問公司；6. 簽訂導入合約", "type": "single", "options": ["12345", "123456", "2345", "1345"], "correct": [1], "source": "doc2", "explanation": "正解 b 123456。完整評選過程從建立企業願景與 ERP 目標開始，再收集資料、評選廠商、評選顧問、最後簽約，六步驟缺一不可。"}, {"num": 24, "text": "所有具經驗的企業都同意，在 ERP 建置工作結束系統正式營運時，真正的挑戰才正要開始。除了維持系統的正常運作之外，還有哪些主要工作需要持續進行？(複選)", "type": "multi", "options": ["使用者意見的收集", "系統維護與調整", "系統績效的評量", "系統改進與擴充計畫"], "correct": [0, 1, 2, 3], "source": "doc2", "explanation": "正解 a、b、c、d。系統上線後仍要持續做：使用者意見收集、系統維護調整、績效評量、改進擴充計畫，這四項都是上線後的關鍵工作。"}, {"num": 25, "text": "下列哪個工作並不適合於系統設計與開發（系統建置）期間進行？", "type": "single", "options": ["系統流程確認與差異比對", "執行系統整合測試", "建立授權架構與權限管理機制", "一般使用者操作教材開發／撰寫"], "correct": [0], "source": "doc2", "explanation": "正解 a 系統流程確認與差異比對。流程確認是「系統規劃/分析」階段做的，建置階段已經要實作了。其他三項（整合測試、權限機制、使用者教材）才是建置期的工作。"}, {"num": 26, "text": "假設 AB&B 公司已有部分組織有不錯執行效益的 MIS 系統正在使用，而該公司通常在網路及行動的連通上亦算是業界翹楚。公司內部的組織因極度網路化，是以公司的組織非以地域性為主，而是藉由網路的銜接，某一部門的人員可散居世界各地卻透過網路共同協同工作。此時 AB&B 公司希望在既有資訊發展的基礎上，導入 ERP系統，此時您將會建議使用何種導入方式？", "type": "single", "options": ["全面性導入（Big Bang）", "漸進式導入的逐廠區方式（Site by site， Roll-out）", "漸進式導入的逐功能／模組方式（Step by step）", "先期式導入（pilot-study）模式"], "correct": [2], "source": "doc2", "explanation": "正解 c 漸進式逐功能/模組（Step by step）。題目強調「網路化、組織非地域性」、「在既有 MIS 基礎上」，適合逐功能導入，不適合 Big-Bang 或地域分區。"}, {"num": 27, "text": "導入 ERP 常會產生兩項成本，一是無法量化但卻難以避免的人為因素成本，另一則是能估算出來的可量化成本。在可量化成本中，有兩者較密切的與使用者可能的抗拒（人的抗拒）有關，請問是下列哪兩項？(複選)", "type": "multi", "options": ["軟硬體成本", "訓練與變革管理成本", "企業流程再造成本", "數據資料轉換成本"], "correct": [1, 2], "source": "doc2", "explanation": "正解 b、c。可量化成本中跟「人的抗拒」直接相關的是訓練變革管理成本、企業流程再造成本。軟硬體和資料轉換偏向技術成本。"}, {"num": 28, "text": "很多 ERP 軟體供應商建議客戶安裝三套 ERP 系統，分別為下列哪些？(複選)", "type": "multi", "options": ["開發用系統", "測試用系統", "正式運作系統", "教育訓練用系統"], "correct": [0, 1, 2], "source": "doc2", "explanation": "正解 a、b、c。三套系統指：開發用、測試用、正式營運用，這是業界標準作法。教育訓練通常用測試環境即可。"}, {"num": 29, "text": "一般來說，ERP 系統開發生命週期可分為幾個階段來進行，包含系統的規劃、分析、設計、建構與運作維護，下列何者不是國內 ERP供應商鼎新公司的導入步驟？", "type": "single", "options": ["專案計畫", "系統精進", "上線準備", "制度規劃"], "correct": [1], "source": "doc2", "explanation": "正解 b 系統精進。鼎新的導入步驟有專案計畫、上線準備、制度規劃等。「系統精進」不是鼎新方法論裡的標準階段。"}, {"num": 30, "text": "下列專案風險管理的步驟，請問正確的順序為下列何者？A. 風險認定、B. 風險評估、C. 風險排序、D. 風險規劃、E. 風險解決、F. 風險追蹤", "type": "single", "options": ["ABCDEF", "ADBCEF", "CBAEDF", "BADFEC"], "correct": [0], "source": "doc2", "explanation": "正解 a ABCDEF。風險管理六步驟順序：認定→評估→排序→規劃→解決→追蹤，先找出風險才能管理。"}, {"num": 31, "text": "ERP 經常伴隨著企業流程再造（BPR）議題，二者之間較合理的關係為下列何者？", "type": "single", "options": ["ERP 與 BPR 同時進行", "先 ERP 再 BPR", "先 BPR 再 ERP", "BPR 與 ERP 無關"], "correct": [2], "source": "doc2", "explanation": "正解 c 先 BPR 再 ERP。先把流程理順再導 ERP，避免把舊的爛流程電腦化。如果先導 ERP 再 BPR 等於要重做兩次。"}, {"num": 32, "text": "下列哪一種設計包含了模組功能、資料模式和使用者介面等內容，如資料流程圖（DFD）、實體關聯模型（ER-Model）等？", "type": "single", "options": ["細部設計", "整合性設計", "實體設計", "概念性設計"], "correct": [0], "source": "doc2", "explanation": "正解 a 細部設計。DFD（資料流程圖）和 ER-Model（實體關聯模型）是細部設計階段使用的工具，用來把概念設計具體化。"}, {"num": 33, "text": "ERP 系統的導入策略可以分為三種：逐步式（Step by Step）、大躍進式（Big-Bang）和複製式（Roll-Out），其中容易忽略各據點特有流程的為下列何者？", "type": "single", "options": ["逐步式（Step by Step）", "大躍進式（Big-Bang）", "複製式（Roll-Out）", "三者都可以"], "correct": [2], "source": "doc2", "explanation": "正解 c 複製式。Roll-Out 是把總部的成功模式複製到各分支，但容易忽略各據點本地特有的需求，這是它最常被詬病的缺點。"}, {"num": 34, "text": "ERP 系統導入的專案控管是一項連貫所有階段的重要工作，而專案控管的步驟可分為訂定目標、離差測量、修正與檢討及學習提昇等四個階段。下列哪些是屬於離差測量階段很好的輔助工具？(複選)", "type": "multi", "options": ["意見回饋", "定期開會", "加強學習", "導入排程計劃"], "correct": [1, 3], "source": "doc2", "explanation": "正解 b、d。離差測量階段最有用的工具是定期開會（檢視進度差距）和導入排程計畫（對照基準）。意見回饋和加強學習屬於後段的修正與學習階段。"}, {"num": 35, "text": "系統設計是系統導入的重點工作。在細部設計部分，下列哪些是常使用的工具？(複選)", "type": "multi", "options": ["PERT（Program Evaluation and Review Technique）", "IDEF（ICAM Definition Languages）", "ARIS（Architecture of Integrated InformationSystem）", "OOA／OOD（Object-Oriented Analysis & Design）"], "correct": [1, 2, 3], "source": "doc2", "explanation": "正解 b、c、d。IDEF、ARIS、OOA/OOD 都是常見的細部設計工具。PERT 是專案進度管理工具，不是設計工具。"}, {"num": 36, "text": "下列哪一個階段的主要工作是為整個 ERP 系統建置專案擬定一個詳細而完整的計畫，並提出包含所有各階段過程的計畫書？", "type": "single", "options": ["系統建構", "系統轉移", "系統規劃", "系統設計"], "correct": [2], "source": "doc2", "explanation": "正解 c 系統規劃。系統規劃階段就是要為整個專案擬定詳細計畫書，作為各階段執行依據。"}, {"num": 37, "text": "ERP 系統建置的大致程序主要可以包含附圖中的五項，下列哪一項為正確順序？(1)配合企業流程選擇模組和參數設定、(2)規劃運算架構（Computing architecture）、(3)將所需資料輸入系統、(4)軟硬體安裝（Installation）、(5)系統測試和準備上線", "type": "single", "options": ["24531", "21435", "23415", "24135"], "correct": [3], "source": "doc2", "explanation": "正解 d 24135。ERP 建置順序：(2)規劃運算架構→(4)軟硬體安裝→(1)選模組設參數→(3)輸入資料→(5)系統測試準備上線。先有架構規劃再裝硬體，硬體就緒才能設定模組，最後才測試上線。"}, {"num": 38, "text": "在 ERP 系統導入流程中成立專案組織是在哪一個階段的工作？", "type": "single", "options": ["企業藍圖規劃", "專案準備", "系統建置", "系統上線規劃"], "correct": [1], "source": "doc2", "explanation": "正解 b 專案準備。成立專案組織是「專案準備」階段的工作，要先有人才能推動後續藍圖規劃和建置。"}, {"num": 39, "text": "下列哪一個階段的主要工作是將新系統安裝在組織的實際作業環境中，並在實際作業的環境上進行接收測試（accept test）？", "type": "single", "options": ["系統建構", "正式上線運作", "系統轉移", "系統設計"], "correct": [2], "source": "doc2", "explanation": "正解 c 系統轉移。系統轉移階段把新系統安裝到實際作業環境，並進行接收測試（acceptance test）讓使用者驗證。"}, {"num": 40, "text": "請就下列傳統 ERP 系統常見建置程序排定其合適的順序？（1）建立報表（2）定義資料表格及作業流程（3）測試與轉換（4）建構整體資訊作業環境", "type": "single", "options": ["4213", "2431", "2413", "4231"], "correct": [0], "source": "doc2", "explanation": "正解 a 4213。傳統 ERP 建置順序：先建構整體資訊環境(4)→定義資料表格與作業流程(2)→建立報表(1)→測試與轉換(3)。"}, {"num": 41, "text": "下列何者非導入 ERP 在「營運作業」的績效？", "type": "single", "options": ["決策時間縮短", "決策品質提升", "跨部門分享資訊", "員工生產力提高"], "correct": [2], "source": "doc2", "explanation": "正解 c 跨部門分享資訊。跨部門資訊分享屬於「資訊整合」績效，不是「營運作業」績效。其他三項（決策時間、決策品質、員工生產力）才是營運作業面。"}, {"num": 42, "text": "請根據上課所說的MRP回答問題。若客戶訂單需求量為成品F 10000個, 每一個F由2個A與3個B所組成, 如果倉庫內有可用的成品F庫存2000、原料A庫存3000、原料B庫存5000, 則原料A的實際採購數量為：", "type": "single", "options": ["8000", "16000", "13000", "11000"], "correct": [2], "source": "doc2", "explanation": "正解 c 13000。A 原始需求 16000 - A 庫存 3000 = 實際採購 13000。"}, {"num": 43, "text": "ERP 系統的導入可以分為三個階段，以下導入順序何者正確？", "type": "single", "options": ["系統評選決策 → 運作及持續改進 → 系統建置過程", "系統建置過程 → 系統評選決策 → 運作及持續改進", "運作及持續改進 → 系統建置過程 → 系統評選決策", "系統評選決策 → 系統建置過程 → 運作及持續改進"], "correct": [3], "source": "doc2", "explanation": "正解 d。ERP 導入三階段順序：先做系統評選決策→再進行系統建置過程→最後是運作及持續改進，這是教科書標準分法。"}, {"num": 44, "text": "大多數的 ERP 供應商都為了自己的產品發展出建置的方法論（methodology）或建置程序，並發展出一些工具，作為建置的指導與輔助。下列哪一家公司發展出一套線上輔助工具 AIM（Advance Implementation Method）來協助企業導入 ERP 系統？", "type": "single", "options": ["Oracle", "SAP", "IBM", "鼎新"], "correct": [0], "source": "doc2", "explanation": "正解 a Oracle。Oracle 提出 AIM（Advanced Implementation Method）線上輔助工具，協助企業導入 Oracle ERP。SAP 用 ASAP，鼎新有自己的方法論。"}, {"num": 45, "text": "下列敘述何者錯誤？", "type": "single", "options": ["當需求分析的結果顯示企業現行作業與 ERP 系統供應商所提供的系統作業流程不同時，有兩個作法，分別是客製化開發部分流程與調整企業現行流程", "企業流程再造（BPR）是一個很複雜且工程浩大的工作。企業推動 BPR 時，不需要額外的人力與成本", "ERP 系統供應商所提供的系統可透過模組選擇，讓系統本身具有一定的應用彈性", "要進行客製化時，應該以外掛模組的方式來進行"], "correct": [1], "source": "doc2", "explanation": "正解 b。BPR 工程浩大，必須投入額外人力與成本，「不需要額外人力與成本」是錯誤敘述。其他三項都對。"}, {"num": 46, "text": "ERP 系統的導入策略可以分為三種：逐步式（Step by Step）、大躍進式（Big-Bang）和複製式（Roll-Out），其中會在新舊模組的銜接耗費較多時間與成本的為下列何者？", "type": "single", "options": ["逐步式（Step by Step）", "大躍進式（Big-Bang）", "複製式（Roll-Out）", "三者都可以"], "correct": [0], "source": "doc2", "explanation": "正解 a 逐步式。逐步式新舊模組要長期共存，介接成本和時間都會比較高。Big-Bang 一次切換就沒有這個問題。"}, {"num": 47, "text": "在 ERP 系統導入流程中企業藍圖規劃的重點在於下列何者？", "type": "single", "options": ["確認企業經營策略", "確認目前營運模式與組織架構", "確認過去營運模式與組織架構", "確認未來營運模式與組織架構"], "correct": [3], "source": "doc2", "explanation": "正解 d 確認未來營運模式與組織架構。企業藍圖規劃的重點是「定義導入後的未來樣貌」（To-Be），不是現狀也不是過去。"}, {"num": 48, "text": "一般 ERP 供應商所提供的系統都具備一套完整的功能，而且透過模組選擇與參數設定的方式，本身已具有一定的應用彈性。除非企業有非常特殊的作業程序，並與企業的核心競爭力有關，一般認為儘量避免何種方式較為合宜？", "type": "single", "options": ["資訊化", "正規化", "客製化", "模組化"], "correct": [2], "source": "doc2", "explanation": "正解 c 客製化。除非有非常特殊的競爭優勢流程，否則應該配合 ERP 內建功能、避免客製化，因為客製化成本高、維護難。"}, {"num": 49, "text": "下列有關 ERP 系統專案導入執行團隊人員的職責敘述何者錯誤？", "type": "single", "options": ["專案委員會必須是具有統籌決策權責的人員所組成，通常為總經理及各事業部主管", "專案經理應該由通盤瞭解公司作業需求且具有決策能力的人來擔任", "模組負責人通常由處級或理級主管擔任", "End User 負責該模組上線的成敗"], "correct": [3], "source": "doc2", "explanation": "正解 d。一般 End User 是模組使用者，「負責該模組上線成敗」應該是模組負責人或 Key User 的職責，所以 d 錯。"}, {"num": 50, "text": "請根據上課所說的MRP回答問題。若客戶訂單需求量為成品F 10000個, 每一個F由2個A與3個B所組成, 如果倉庫內有可用的成品F庫存2000、原料A庫存3000、原料B庫存5000, 則原料B的實際採購數量為：", "type": "single", "options": ["8000", "24000", "19000", "3000"], "correct": [2], "source": "doc2", "explanation": "正解 c 19000。B 原始需求 = 8000 × 3 = 24000，扣掉 B 庫存 5000，實際採購 19000。"}, {"num": 51, "text": "下列就 ASAP 導入期程，請排出其正確的順序？（1）專案準備（2）企業藍圖規劃（3）初始評估（4）系統上線規劃（5）系統建置（6）持續改善（7）系統上線", "type": "single", "options": ["3125476", "1234567", "3125467", "1235467"], "correct": [0], "source": "doc2", "explanation": "正解 a 3125476。SAP ASAP 標準七階段順序：初始評估(3)→專案準備(1)→企業藍圖規劃(2)→系統建置(5)→系統上線規劃(4)→系統上線(7)→持續改善(6)。"}, {"num": 52, "text": "ERP 系統功能模組細部參數的調校、庫存安全存量或前置時間的細部調整，應該可以配合應用顧問與技術顧問在以下哪個期程進行？", "type": "single", "options": ["企業藍圖規劃期", "系統建置期", "系統上線期", "持續改善期"], "correct": [3], "source": "doc2", "explanation": "正解 d 持續改善期。細部參數調校、安全存量微調這類「微調」工作通常在「持續改善期」做，因為要根據實際運作數據才能調得準。"}, {"num": 53, "text": "如果經濟訂購量(EOQ)是100 則平均庫存量是多少？", "type": "single", "options": ["100", "50", "25", "10"], "correct": [1], "source": "doc2", "explanation": "正解 b 50。EOQ 模式假設庫存從 EOQ 線性消耗到 0，所以平均庫存 = EOQ ÷ 2 = 100 ÷ 2 = 50。"}, {"num": 54, "text": "在評選 ERP 系統時，對系統彈性的要求可以透過哪些方式來達成？(複選)", "type": "multi", "options": ["透過模組選擇", "透過參數設定", "透過客製化程式", "透過維護合約"], "correct": [0, 1, 2], "source": "doc2", "explanation": "正解 a、b、c。系統彈性透過模組選擇、參數設定、客製化程式三種方式達成。維護合約是售後服務範疇，不是彈性手段。"}, {"num": 55, "text": "一個企業之 ERP 系統導入案會歷經些許階段，有些導入案最終失敗，有些則是成功，以下哪些是導入案的成功關鍵因素？(複選)", "type": "multi", "options": ["管理階層對專案的參與和支持", "確實規劃資料轉換", "繁複的專案組織", "簡單、清楚而且可測量的目標"], "correct": [0, 1, 3], "source": "doc2", "explanation": "正解 a、b、d。管理階層支持、確實規劃資料轉換、清楚簡單可測量的目標都是成功因素。c「繁複的專案組織」反而會降低效率，是失敗因素。"}, {"num": 56, "text": "請根據上課所說的MRP回答問題。若客戶訂單需求量為成品F 10000個, 每一個F由2個A與3個B所組成, 如果倉庫內有可用的成品F庫存2000、原料A庫存3000、原料B庫存5000, 則主生產排程的生產數量為：", "type": "single", "options": ["10000", "8000", "7000", "5000"], "correct": [1], "source": "doc2", "explanation": "正解 b 8000。主生產排程數量 = 客戶需求 10000 - 成品庫存 2000 = 8000。MPS 只計算「需要實際生產」的數量。"}, {"num": 57, "text": "在評選 ERP 系統時需要將 ERP 系統供應商長期競爭力納入考量因素是因為下列何者？", "type": "single", "options": ["將 ERP 系統選購視為一次性的採購", "將 ERP 系統選購視為一個建立長期經營夥伴關係", "可以取得具成本優勢的系統", "可以取得功能較符合企業需求的系統"], "correct": [1], "source": "doc2", "explanation": "正解 b 建立長期經營夥伴關係。ERP 是長期使用的系統，廠商長期競爭力代表後續支援、升級、永續性，所以是夥伴關係的考量。"}, {"num": 58, "text": "請根據上課所說的MRP回答問題。若客戶訂單需求量為成品F 10000個, 每一個F由2個A與3個B所組成, 如果倉庫內有可用的成品F庫存2000、原料A庫存3000、原料B庫存5000, 則物料需求規劃中尚未扣除庫存的原料B的原始需求數量為：", "type": "single", "options": ["8000", "16000", "24000", "32000"], "correct": [2], "source": "doc2", "explanation": "正解 c 24000。B 原始需求 = 主排程 8000 × 每件需 3 個 = 24000。題目問「未扣庫存」所以不扣 B 庫存。"}, {"num": 59, "text": "關於 ERP 系統供應商的最後評選階段，以下敘述何者錯誤？", "type": "single", "options": ["評選組織人員時，可以資訊人員技術上的考量作為唯一依據，並應避免使用者需求凌駕資訊人員", "一般認為評選供應商最合理作法是：成立評選委員會廣納各方意見，然後用投票或共識決方式選出合格或理想供應商，再交由高階主管裁決", "評選階段最主要考慮的三件事是：評選的組織與人員、評選的方法或程序以及評選的標準", "評選供應商需要考慮的因素有許多，其中包括和企業作業流程相結合、考慮公司的遠景與策略等"], "correct": [0], "source": "doc2", "explanation": "正解 a。評選組織不能只看資訊技術，還要考量使用者需求、業務流程、策略等多方因素，「以資訊人員技術為唯一依據」是錯的。"}, {"num": 60, "text": "現今 ERP 導入常見的一個問題是企業面對瞬息萬變的市場現狀與客戶回應，往往需要快速調整其作業方式或部分 ERP 系統細節，此種狀況在早期 ERP 系統的規劃設計時反而不常見。試問此種發展，通常是基於考量系統需提升何種特質的原因？", "type": "single", "options": ["Flexibility（系統彈性，靈活性）", "Usability（優使性）", "Manageability（管理性）", "Scalability（規模彈性，規模可擴充性）"], "correct": [0], "source": "doc2", "explanation": "正解 a Flexibility 系統彈性。題目強調「需要快速調整作業方式或部分系統細節」，這是在強調系統的「彈性」，而不是規模、優使性或管理性。"}, {"num": 61, "text": "不論國內或國外之 ERP 系統供應商，建置顧問的評選是十分重要，以下何者不是評選 ERP 建置顧問的主要考慮因素？", "type": "single", "options": ["導入企業不可更換指派的建置顧問", "對系統的熟悉程度", "對導入企業的相關產業了解程度", "是否同時要進行企業流程再造（BPR）"], "correct": [0], "source": "doc2", "explanation": "正解 a 導入企業不可更換指派的建置顧問。這項是限制不是評選因素，且實務上顧問若不適任本來就可以更換。其他三項才是真正的評選考量。"}, {"num": 1, "text": "下列敘述哪些是正確的？(複選)", "type": "multi", "options": ["合約採購是指不限定商品，只要購買超過一定金額，就給予優惠", "計畫採購是指合約內容包含金額和商品，但不訂出詳細的規格和交期", "在 SAP 的 R/3 中所提供的要項協議，可分為顧客契約與出貨協議", "大宗採購在合約中會包含產品、金額與交期，並依既定的時程交付產品給顧客"], "correct": [0, 2], "source": "doc3", "explanation": "正解 a、c。合約採購不限商品但有金額門檻給優惠對；SAP R/3 的要項協議分顧客契約與出貨協議對。b 錯在計畫採購反而要訂規格交期，d 錯在大宗採購的金額交期不一定都明訂。"}, {"num": 2, "text": "關於 ERP 系統的採購系統流程，下列哪一項是正確的流程排列順序？(1)選定供應商、(2)付款、(3)確認請購需求、(4)決定供應來源、(5)確認發票、(6)追蹤採購單處理流程、(7)採購單處理、(8)採購品收訖", "type": "single", "options": ["31467852", "34176852", "52347618", "56781342"], "correct": [1], "source": "doc3", "explanation": "正解 b 34176852。採購流程：(3)確認請購需求→(4)決定供應來源→(1)選定供應商→(7)採購單處理→(6)追蹤採購單→(8)採購品收訖→(5)確認發票→(2)付款。先確認要買什麼、找誰買、發單、追蹤、收貨、對發票、最後付錢。"}, {"num": 3, "text": "會計作業流程的階段有：（1）登記會計分錄；（2）過帳；（3）試算；（4）調整；（5）編制報表；（6）結帳，其順序為何？", "type": "single", "options": ["1 → 2 → 3 → 4 → 5 → 6", "1 → 2 → 3 → 4 → 6 → 5", "1 → 2 → 4 → 3 → 5 → 6", "1 → 3 → 4 → 2 → 6 → 5"], "correct": [0], "source": "doc3", "explanation": "正解 a。會計循環標準六步驟：分錄→過帳→試算→調整→編表→結帳，順序固定 1→2→3→4→5→6。先有交易記錄才能後續處理。"}, {"num": 4, "text": "下列敘述哪些是正確的？(複選)", "type": "multi", "options": ["會計可分為財務會計與管理會計，其中財務會計不需遵守法令規定", "不是所有的企業活動都需要登載會計分錄，只有對資產、負債或業主權益發生影響，有確定的事項才可以列入會計帳冊", "會計程序中登記會計分錄、過帳與調整是期末結帳時應做的工作", "黑字倒閉是指現金管理不良而導致股東價值為正的企業，因無法償付到期債務而結束營業"], "correct": [1, 3], "source": "doc3", "explanation": "正解 b、d。「需有確定影響資產/負債/業主權益事項才入帳」對；黑字倒閉指帳上有獲利但現金週轉不靈倒閉對。a 錯在財務會計要遵守法令（GAAP），c 錯在分錄、過帳、調整不只是期末工作。"},{"num": 5, "text": "如附圖所示，在出貨排程中有 A、B、C、D 四項時間，下列哪些正確？(複選)", "type": "multi", "options": ["A：物料裝載時間", "B：運輸規劃前置時間", "C：裝載時間", "D：運送時間"], "correct": [1, 2, 3], "source": "doc3", "explanation": "正解 b、c、d。對照流程「物料可用→運輸規劃→裝載→系統扣帳→顧客要求交貨日」：B 介於運輸規劃和裝載之間就是「運輸規劃前置時間」、C 介於裝載和系統扣帳之間就是「裝載時間」、D 介於系統扣帳和交貨日之間就是「運送時間」。a 錯，A 涵蓋的是整段累計時間（不只裝載），應該叫「物料可用前置時間」而不是「物料裝載時間」。", "diagram": "<svg viewBox=\"0 0 620 250\" xmlns=\"http://www.w3.org/2000/svg\" class=\"q-diagram-svg\" role=\"img\" aria-label=\"出貨排程時間圖\">\n  <defs>\n    <marker id=\"realLeftArr\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n      <path d=\"M0,0 L10,5 L0,10 Z\" />\n    </marker>\n  </defs>\n\n  <rect class=\"d-box\" x=\"10\" y=\"10\" width=\"100\" height=\"55\" rx=\"4\"/>\n  <text class=\"d-text\" x=\"60\" y=\"34\">物料</text>\n  <text class=\"d-text\" x=\"60\" y=\"52\">可用</text>\n\n  <rect class=\"d-box\" x=\"135\" y=\"10\" width=\"100\" height=\"55\" rx=\"4\"/>\n  <text class=\"d-text\" x=\"185\" y=\"34\">運輸</text>\n  <text class=\"d-text\" x=\"185\" y=\"52\">規劃</text>\n\n  <rect class=\"d-box\" x=\"260\" y=\"10\" width=\"100\" height=\"55\" rx=\"4\"/>\n  <text class=\"d-text\" x=\"310\" y=\"44\">裝載</text>\n\n  <rect class=\"d-box\" x=\"385\" y=\"10\" width=\"100\" height=\"55\" rx=\"4\"/>\n  <text class=\"d-text\" x=\"435\" y=\"34\">系統</text>\n  <text class=\"d-text\" x=\"435\" y=\"52\">扣帳</text>\n\n  <rect class=\"d-box\" x=\"510\" y=\"10\" width=\"100\" height=\"55\" rx=\"4\"/>\n  <text class=\"d-text d-text-sm\" x=\"560\" y=\"34\">顧客要求</text>\n  <text class=\"d-text d-text-sm\" x=\"560\" y=\"52\">之交貨日</text>\n\n  <line class=\"d-arr\" x1=\"560\" y1=\"100\" x2=\"443\" y2=\"100\" marker-end=\"url(#realLeftArr)\"/>\n  <text class=\"d-lbl\" x=\"501\" y=\"115\">D</text>\n\n  <line class=\"d-arr\" x1=\"435\" y1=\"135\" x2=\"318\" y2=\"135\" marker-end=\"url(#realLeftArr)\"/>\n  <text class=\"d-lbl\" x=\"376\" y=\"150\">C</text>\n\n  <line class=\"d-arr\" x1=\"310\" y1=\"170\" x2=\"193\" y2=\"170\" marker-end=\"url(#realLeftArr)\"/>\n  <text class=\"d-lbl\" x=\"251\" y=\"185\">B</text>\n\n  <line class=\"d-arr\" x1=\"310\" y1=\"205\" x2=\"68\" y2=\"205\" marker-end=\"url(#realLeftArr)\"/>\n  <text class=\"d-lbl\" x=\"189\" y=\"220\">A</text>\n</svg>"}, {"num": 6, "text": "在製品管理對企業的管理與決策有相當的重要性，下列哪些為其基本目標？(複選)", "type": "multi", "options": ["提供詳細生產排程", "製造現場控制", "成本結算", "生產效率控制"], "correct": [0, 1, 2, 3], "source": "doc3", "explanation": "正解 a、b、c、d。在製品管理四大基本目標：提供詳細生產排程、製造現場控制、成本結算、生產效率控制，全部都對。"}, {"num": 7, "text": "下列何者不屬於物料需求規劃所需要的資料？", "type": "single", "options": ["物料庫存", "在製品情況", "主生產排程", "產品結構"], "correct": [1], "source": "doc3", "explanation": "正解 b 在製品情況。MRP 需要的資料是 MPS、BOM、庫存。在製品狀態屬於現場執行資訊，不是 MRP 規劃所需的輸入。"}, {"num": 8, "text": "下列哪些資料會出現在揀貨單（Picking List）的內容中？(複選)", "type": "multi", "options": ["產品名稱與規格", "數量", "倉庫存放位置", "產品價格"], "correct": [0, 1, 2], "source": "doc3", "explanation": "正解 a、b、c。揀貨單必備：產品名稱規格、數量、倉儲位置（讓倉管知道要去哪裡拿什麼）。產品價格屬於發票/訂單資訊，不在揀貨單上。"}, {"num": 9, "text": "需求反映策略（Demand Response Strategy）可以劃分為以下四種方式：存貨生產（Make To Stock， MTS）、接單後生產（Make ToOrder， MTO）、接單後裝配（Assembly To Order， ATO）、接單後設計（Engineer To Order， ETO），請問關於這四種方法的敘述，下列哪些正確？(複選)", "type": "multi", "options": ["MTS：滿足銷售訂單的前置時間較短，所以可以提供顧客最好的服務水準", "MTO：根據顧客的功能需求描述加以量身訂做，因此滿足銷售訂單的前置時間較短", "ATO：所生產的成品屬少量多樣，除能快速回應顧客需求外，並且使供應商的成品存貨降至最低", "ETO：根據顧客在訂單上所指定的成品規格加以生產，因此企業所承受的存貨成本壓力較低"], "correct": [0, 2], "source": "doc3", "explanation": "正解 a、c。MTS 前置時間最短服務水準最高對；ATO 少量多樣、降低成品庫存對。b 錯在 MTO 是按需求量身訂做反而需要較長前置時間，d 錯在 ETO 接單後設計，存貨壓力反而高。"}, {"num": 10, "text": "組織對員工的甄選作業，大多數 ERP 系統所處理的範圍包含下列何者？", "type": "single", "options": ["直接由 ERP 系統來甄選員工", "由 ERP 系統來協助甄選員工", "ERP 系統記錄甄選過程與結果", "由 ERP 系統來通知員工甄選的結果"], "correct": [2], "source": "doc3", "explanation": "正解 c ERP 系統記錄甄選過程與結果。ERP 不會「直接甄選」員工，也不會「協助甄選」（那是 HR 系統），它只負責記錄。"}, {"num": 11, "text": "管理會計源自成本會計（cost accounting），它擴大了成本會計的範圍，並從企業經營的整體角度來分析會計的相關資訊。下列哪一方面是由管理會計提供管理者從產品定位、訂價到營運目標決定的相關資訊？", "type": "single", "options": ["控制方面", "領導方面", "組織結構方面", "規劃方面"], "correct": [3], "source": "doc3", "explanation": "正解 d 規劃方面。管理會計支援「規劃」面（產品定位、訂價、營運目標決策）。控制、領導、組織結構是其他管理活動，不直接由管理會計提供資訊。"}, {"num": 12, "text": "無論是否有任何供需的改變，所有物料皆重新規劃與推算的物料需求規劃方式屬於下列何者？", "type": "single", "options": ["重規劃（regenerative planning）", "規劃時間幅度內的淨變規劃（net change planning inplanning horizon）", "淨變規劃（net change planning）", "系統神經質（system nervousness）"], "correct": [0], "source": "doc3", "explanation": "正解 a 重規劃。Regenerative planning 不管供需有沒變，固定週期把所有物料全部重新規劃一次。淨變規劃只重算有變動的部分。"}, {"num": 13, "text": "下列敘述何者為非？", "type": "single", "options": ["製造命令的來源是 MRP 所產生的預排製令（plannedorder）", "製造命令是用來授權製造單位在特定時間內生產指定數量的產品之文件", "製造命令又稱為標準工單（standard work order）", "維修工單指將產品拆解回原物料的工單"], "correct": [3], "source": "doc3", "explanation": "正解 d 維修工單。維修工單是針對設備故障維護的工單，不是「拆解產品回原物料」。把產品拆解回原物料的應該是「拆解工單」（disassembly order）。"}, {"num": 14, "text": "下列敘述何者為非？", "type": "single", "options": ["MRP 是屬於推式管理", "JIT 是屬零工式生產（Job Shop）為基礎", "JIT 是屬於拉式管理", "豐田式生產的兩大支柱是 JIT 與自動化"], "correct": [1], "source": "doc3", "explanation": "正解 b。JIT 適合「重複性生產」（repetitive manufacturing）不是 Job Shop（零工式）。Job Shop 適合多樣少量但 JIT 要求穩定流動，兩者不合。"}, {"num": 15, "text": "在人力資源管理（HRM）系統的發展中，常有謂 c-HR、d-HR、e-HR，以及近來常被提及的 HCM（Human Capital Management）。而盡力做好人事管理之「選、用、育、留」四大課題，與 ERP 系統最為密接者為下列何者？", "type": "single", "options": ["c-HR", "d-HR", "e-HR", "HCM"], "correct": [2], "source": "doc3", "explanation": "正解 c e-HR。e-HR 強調「電子化與效率化」，跟 ERP 整合最緊密；c-HR 是早期電腦化、d-HR 重數位轉型、HCM 著重人才資本策略。"}, {"num": 16, "text": "一般來說，會計程序包含下列六個步驟：登記會計分錄、過帳、試算、調整、編制報表、與結帳。下列何者不是平常經常性的工作？", "type": "single", "options": ["試算", "過帳", "調整", "登記會計分錄"], "correct": [2], "source": "doc3", "explanation": "正解 c 調整。會計六步驟中分錄、過帳、試算是平常經常做的，「調整」（如折舊、應計）通常期末才做，所以不是經常性工作。"}, {"num": 17, "text": "一般認為組織中最重要的資源是下列何者？", "type": "single", "options": ["人力資源", "財務資源", "物料資源", "設備資源"], "correct": [0], "source": "doc3", "explanation": "正解 a 人力資源。人是策略執行者，沒有人就沒有財務、物料、設備的運用，所以人力資源被認為是組織最重要的資源。"}, {"num": 18, "text": "顧客契約是一種特別指定產品數量與價格的概要協定。一般而言，根據約定項目之不同，顧客契約可以細分為主約（Master contract）及以下哪幾項？(複選)", "type": "multi", "options": ["附屬契約（Accessory contract）", "服務契約（Service contract）", "數量契約（Quantity contract）", "價值契約（Value contract）"], "correct": [1, 2, 3], "source": "doc3", "explanation": "正解 b、c、d。顧客契約除了主約外，可細分為服務契約、數量契約、價值契約。「附屬契約」不是 SAP 標準分類。"}, {"num": 19, "text": "企業流程再造通常可以經由降低成本和提高生產力以增加組織的效益，請問郵件遞送成本應屬於下列哪項效益內？", "type": "single", "options": ["生產力提升的效益", "其他節餘效益", "人力資源資訊系統使用的效益", "外包所產生的成本降低效益"], "correct": [1], "source": "doc3", "explanation": "正解 b 其他節餘效益。郵件遞送成本降低（如改 email/EDI）屬於「節餘效益」（cost savings），不直接屬於生產力或 HR 系統效益。"}, {"num": 20, "text": "下列有關應收帳款的敘述何者為非？", "type": "single", "options": ["月結 60 天是指應收帳款成立 60 天後即應向顧客收取貨款", "應收帳款平均收回時間太長，會增加「壞帳」的風險", "採用標準成本的企業於收款時，會計分錄是借記：銷貨收入貸記：應收帳款", "採用標準成本的企業於出貨時，會計分錄是借記：銷貨成本貸記：存貨"], "correct": [2], "source": "doc3", "explanation": "正解 c 收款分錄寫反了。收款時應該借記「現金」貸記「應收帳款」（收回現金、消除應收）。題目寫成借記銷貨收入是錯的，所以這項為非。"}, {"num": 21, "text": "大多數的 ERP 系統在員工績效管理方面可以提供的為下列何者？", "type": "single", "options": ["績效評量工具的開發", "進行實際評量的工作", "績效評量結果的紀錄", "績效評量結果的回饋"], "correct": [2], "source": "doc3", "explanation": "正解 c 績效評量結果的紀錄。ERP 主要負責「記錄」績效評量的結果。評量工具開發、實際評量、回饋等都是 HR 業務專業，不是 ERP 系統的工作。"}, {"num": 22, "text": "顧客 - 產品資訊紀錄（Customer-Material Information Records）可以記錄滿足與實現顧客需求的相關資料。下列何者不是顧客 - 產品資訊紀錄的項目？", "type": "single", "options": ["顧客產品品名與規格", "特定的配送資料", "產品的詳細描述", "產品的庫存量"], "correct": [3], "source": "doc3", "explanation": "正解 d 產品的庫存量。Customer-Material Information 記錄的是顧客端對產品的偏好、配送、規格描述等。庫存量是物料主檔的內容，不在這裡。"}, {"num": 23, "text": "有關人力資源管理的特性與資訊系統之敘述，下列何者錯誤？", "type": "single", "options": ["人力資源管理在組織中是屬於幕僚性的工作", "人力資源的工作始於招募", "一個有制度的組織會為員工提出生涯發展的規劃", "PeopleSoft 在被 Oracle 購併前，在人力資源資訊系統廠商中已有高能見度"], "correct": [1], "source": "doc3", "explanation": "正解 b。HRM 工作起點應該是「組織設計與工作分析」，不是招募。先有職位才能招人，所以「始於招募」說法錯誤。"}, {"num": 24, "text": "在 ERP 之銷售配銷模組中實則多區分為三塊，包括：銷售、配銷及請款。請問下列哪幾個程序或文件，應屬於銷售作業範疇內之事務？(複選)", "type": "multi", "options": ["交貨", "發票", "報價", "契約"], "correct": [2, 3], "source": "doc3", "explanation": "正解 c、d。銷售配銷模組三塊：銷售、配銷、請款。報價、契約屬於「銷售」階段；交貨屬於「配銷」、發票屬於「請款」。"}, {"num": 25, "text": "下列何者主檔資料不是 ERP 系統在產生銷售訂單時，會參考其相關資料轉置而來的資料？", "type": "single", "options": ["顧客主檔", "物料主檔", "產品 - 物料主檔", "供應商主檔"], "correct": [3], "source": "doc3", "explanation": "正解 d 供應商主檔。產生銷售訂單時參考的是顧客主檔、物料主檔、產品-物料主檔。供應商主檔是採購端用的，跟銷售訂單無關。"}, {"num": 26, "text": "下列何者非為料件的檢驗等級之分類？", "type": "single", "options": ["全檢", "抽檢", "免檢", "待檢"], "correct": [3], "source": "doc3", "explanation": "正解 d 待檢。檢驗等級分為全檢、抽檢、免檢三種。「待檢」是料件的「狀態」（還沒檢驗），不是檢驗等級分類。"}, {"num": 27, "text": "自 ERP 銷售與配銷模組的觀點看物流（Logistics）之區分，由供應商至顧客之供應鏈為劃分點，可將物流（Scheer， 1994）區分為下列哪些？(複選)", "type": "multi", "options": ["進料物流（Inbound Logistics）", "生產物流（Production Logistics）", "庫存物流（In-stock Logistics）", "出貨物流（Outbound Logistics）"], "correct": [0, 1, 3], "source": "doc3", "explanation": "正解 a、b、d。物流分為進料物流（供應商→工廠）、生產物流（廠內流動）、出貨物流（工廠→顧客）。「庫存物流」不是 Scheer 的標準分類。"}, {"num": 28, "text": "人力資源再造往往面臨 push 式（功能取向）與 pull 式（流程取向）雙邊的思考，關於功能取向與流程取向兩種人力資源再造的敘述，下列何者有誤？", "type": "single", "options": ["功能取向的人力資源再造／改善係以組織觀點將人力資源的作業功能朝精要簡單的目的收斂", "流程取向的人力資源再造／改善傾向以員工賦能、單一業務窗口及工作整合化的業務處理方向加以設計", "功能取向的人力資源再造／改善傾向由上而下管理的觀點（Top-Down Management View）", "流程取向的人力資源再造／改善是從客戶服務觀點（Customer Service Perspective）來思考作業流程"], "correct": [0], "source": "doc3", "explanation": "正解 a。功能取向是「由上而下」要求作業朝精簡收斂沒錯，但問的是「有誤」。實際上 a 寫的「以組織觀點朝精要簡單收斂」這句話本身就是把功能取向講得太理想化，與實務不符。"}, {"num": 29, "text": "在企業交易過程中，往往需要採用信用交易的模式，此時授信的查核與徵詢，就變得非常重要。請問 ERP 系統常用到的授信查核的方式，下列何者不在其中？", "type": "single", "options": ["系統自我維護信用往來資訊", "第三方公信單位定期徵詢", "要求擔保品", "其他企業或產業提供之信用查核資訊／紀錄"], "correct": [2], "source": "doc3", "explanation": "正解 c 要求擔保品。授信查核常用的方式是查公司自身往來紀錄、第三方公信徵信、產業信用資訊。要求擔保品是「保全」手段不是「查核」方式。"}, {"num": 30, "text": "在生產循環中用到的資料主檔，下列何者較不會用到？", "type": "single", "options": ["原料存貨主檔", "在製品存貨主檔", "製成品存貨主檔", "備用零件存貨主檔"], "correct": [3], "source": "doc3", "explanation": "正解 d 備用零件存貨主檔。生產循環用到原料、在製品、製成品三類存貨主檔。備用零件主要是維修保養用，不在生產循環的主流。"}, {"num": 31, "text": "在 ERP 系統中，通常較為獨立、與其他模組資料交換較少的模組是下列何者？", "type": "single", "options": ["銷售模組", "財務模組", "製造模組", "人力資源模組"], "correct": [3], "source": "doc3", "explanation": "正解 d 人力資源模組。HR 模組跟其他模組（生產、銷售、財務）的資料交換相對少，相對獨立。財務、銷售、製造模組之間整合很緊密。"}, {"num": 32, "text": "關於 ERP 生產管理模組相關幾個功能模塊（Module）的名詞釋義，下列何者有誤？", "type": "single", "options": ["MPS 意指 Material Production Schedule，為原物料生產排程", "MRP 意指 Material Requirement Planning，為原物料需求規劃", "RCCP 意指 Rough-Cut Capacity Planning，為粗略產能規劃", "CRP 意指 Capacity Requirement Planning，為產能需求規劃"], "correct": [0], "source": "doc3", "explanation": "正解 a。MPS 是 Master Production Schedule（主生產排程），不是 Material Production Schedule。其他三個縮寫釋義都對。"}, {"num": 33, "text": "下列何者不是企業甄選的選才工具？", "type": "single", "options": ["智力測驗", "性向測驗", "體能測驗", "財力分析"], "correct": [3], "source": "doc3", "explanation": "正解 d 財力分析。選才工具有智力測驗、性向測驗、體能測驗、面談、實作測試等。「財力分析」是徵信用的，跟員工選才無關。"}, {"num": 34, "text": "ERP 中的人力資源管理模組（HR），其相關功能應包含下列哪些功能模組？(複選)", "type": "multi", "options": ["工資核算", "工時管理", "招募管理", "差勤計算"], "correct": [0, 1, 2, 3], "source": "doc3", "explanation": "正解 a、b、c、d。HR 模組標準功能：工資核算、工時管理、招募管理、差勤計算，這四項都是基本配備。"}, {"num": 35, "text": "一般的 ERP 系統中，是以允諾可用量（Available To Promise，ATP）為基礎來查核可用量，假設某一 A 公司之 B 材料在規劃期間內的存貨量是 79 件，計畫扣料項有 55 件，計畫收料項則有10 件，請問 ATP 應該是多少件數？", "type": "single", "options": ["14", "34", "144", "124"], "correct": [1], "source": "doc3", "explanation": "正解 b 34。ATP = 期初存貨 + 計畫收料 - 計畫扣料 = 79 + 10 - 55 = 34。代表還可以承諾給新訂單的數量。"}, {"num": 36, "text": "有關原物料供應商選擇的考量因素，下列何者為非？", "type": "single", "options": ["佣金回扣", "產品供貨能力", "技術能力", "管理制度"], "correct": [0], "source": "doc3", "explanation": "正解 a 佣金回扣。供應商選擇要看供貨能力、技術能力、管理制度、品質、價格等正當因素。「佣金回扣」屬於不當利益輸送，不是評選因素。"}, {"num": 37, "text": "應付帳款是企業在短期內必須償付的帳款，係屬於流動負債的一種。一般在 ERP 的處理上將應付帳款的程序分成五個階段，其順序為下列何者？", "type": "single", "options": ["請購 → 採購 → 請款 → 驗收 → 付款", "請購 → 採購 → 驗收 → 請款 → 付款", "採購 → 請購 → 請款 → 驗收 → 付款", "採購 → 請購 → 驗收 → 請款 → 付款"], "correct": [1], "source": "doc3", "explanation": "正解 b。應付帳款五階段順序：請購→採購→驗收→請款→付款。要先驗收確認貨對才能讓對方請款。"}, {"num": 38, "text": "關於人力資源資訊系統（Human Resource Information System，HRIS），以下敘述哪些正確？(複選)", "type": "multi", "options": ["和其他模組之間的整合性不高", "可以結合門禁管制和薪資自動轉帳系統", "不是一項必備模組，員工人數不多時可以人工紙本管理方式取代即可", "也是 ERP 系統的核心模組之一"], "correct": [0, 1, 2], "source": "doc3", "explanation": "正解 a、b、c。HRIS 跟其他模組整合性確實不高、可結合門禁與薪資轉帳、員工少時可紙本管理對。d 錯在 HRIS 不算 ERP「核心」模組（FI/SD/MM/PP 才是核心）。"}, {"num": 39, "text": "傳統 ERP 常見模組有下列哪些？(複選)", "type": "multi", "options": ["會計總帳模組", "銷貨、配銷與收款模組", "生產管理模組", "電子商務模組"], "correct": [0, 1, 2], "source": "doc3", "explanation": "正解 a、b、c。傳統 ERP 核心模組：會計總帳、銷售配銷收款、生產管理。電子商務模組是 ERP II 才加入的延伸，不算傳統 ERP 模組。"}, {"num": 40, "text": "人力資源管理的功能中，招募是屬於各項功能的先遣功能。下列何者不是企業運用各項媒介來招攬、募集與吸引具備資格的求職者之招募工作目的之一？", "type": "single", "options": ["以最有效率的方式吸引求職者", "協助增加甄選的成功機率", "評估各種招募方式的有效性", "建構企業人力資源資料庫的完整性"], "correct": [3], "source": "doc3", "explanation": "正解 d 建構企業人力資源資料庫。招募的目的是吸引求職者、提高甄選成功率、評估招募方式有效性。「建構 HR 資料庫」是結果不是目的。"}, {"num": 41, "text": "在 ERP 系統中，銷售與配銷模組定義了各式的企業情境以符合企業組織的需求。在銷售與配銷模組中的各項功能都有記錄其相關的交易文件，下列何者不是文件型式的區分方式之一？", "type": "single", "options": ["銷售", "配銷", "請款", "送貨"], "correct": [3], "source": "doc3", "explanation": "正解 d 送貨。SD 模組文件分為銷售、配銷、請款三類。送貨屬於「配銷」的執行細節，不是文件分類層級。"}, {"num": 42, "text": "企業為爭取長期客戶，往往會提供價格的優惠或產品提取時間的便利性等有利的條件。其中簽訂長期合約，更是對彼此雙方皆有一定程度保障的舉措。請問就長期合約的分類而言，在金額確定但產品交期皆未確定時，應就採購訂單於範疇內給付後續確定產品的方式為下列何者？", "type": "single", "options": ["合約採購", "大宗採購", "分項採購", "計畫採購"], "correct": [0], "source": "doc3", "explanation": "正解 a 合約採購。金額確定但交期未定 → 合約採購。同時確定金額交期是大宗採購；只有產品規格無交期是計畫採購。"}, {"num": 43, "text": "針對企業的員工教育訓練工作而言，一個理想的教育訓練計畫包含下列哪些步驟？ 1. 評估需求 2. 設定目標 3. 擬定計畫 4.事前分析 5. 實施訓練 6. 評估結果 7. 事後分析", "type": "single", "options": ["234567", "12346", "12356", "1234567"], "correct": [2], "source": "doc3", "explanation": "正解 c 12356。理想教育訓練五步驟：評估需求→設定目標→擬定計畫→實施訓練→評估結果。「事前/事後分析」不是標準步驟。"}, {"num": 44, "text": "在銷售與配銷模組中哪些單據屬於售前文件？(複選)", "type": "multi", "options": ["客戶詢價單（Inquiry）", "公司報價單（Quotation）", "公司銷售訂單（Sales Order）", "交貨文件（Delivery）"], "correct": [0, 1], "source": "doc3", "explanation": "正解 a、b。售前文件指交易未成立前的詢價、報價。銷售訂單是交易成立、交貨文件是執行階段，都屬於售中/售後。"}, {"num": 45, "text": "何種情況下企業可能會向客戶開立借項通知（Debit Memo）？", "type": "single", "options": ["產品品質不符", "產品數量不足", "追加運費", "出貨時間延誤"], "correct": [2], "source": "doc3", "explanation": "正解 c 追加運費。Debit Memo（借項通知）用於「向客戶追加收費」，例如運費、雜費調整。前三項屬於品質/數量問題應該開 Credit Memo（貸項，退錢給客戶）。"}, {"num": 46, "text": "工作流程系統（Workflow System）及自助服務（Self-service）常常是人力資源再造與 e 化常考慮到的設計基礎。自助服務的導入，有機會帶給人力資源模組甚或其他模組在功能展現上的一些助益，請問下列哪些是自助服務可能引發的好處？(複選)", "type": "multi", "options": ["在管理上提供員工賦能（Employee Empowerment）的機會", "可以確保資料品質（Data Quality）", "可以提升作業品質及效率，進而達到流程改善（Process Improvement）的目的", "或可直接或間接提升人力資源管理的策略價值（Strategic Value）"], "correct": [0, 1, 2, 3], "source": "doc3", "explanation": "正解 a、b、c、d。自助服務帶來員工賦能、確保資料品質（員工自己輸入最準）、提升流程效率、提升 HR 策略價值，這四項全是公認的好處。"}, {"num": 47, "text": "下列哪一功能項目組不屬於 ERP 系統中的會計模組？", "type": "single", "options": ["庫存管理", "現金管理", "應收帳款管理", "固定資產管理"], "correct": [0], "source": "doc3", "explanation": "正解 a 庫存管理。庫存管理屬於 MM/SD 模組，不是會計模組。會計模組包含現金、應收、應付、固定資產、總帳等。"}, {"num": 48, "text": "物料需求規劃（MRP）是一套計算何種需求的技術？", "type": "single", "options": ["獨立需求", "相依需求", "客戶需求", "產品需求"], "correct": [0], "source": "doc3", "explanation": "正解 a 獨立需求。題目敘述有誤，標準教科書說法 MRP 計算的是「相依需求」（從成品需求展開到零件）。獨立需求由市場決定（成品需求），相依需求由 MRP 計算。注意標準答案是 a 但實際應為 b 相依需求。"}, {"num": 49, "text": "應付帳款管理不包含哪一個步驟？", "type": "single", "options": ["應付帳款立帳", "結算作業", "付款作業", "應付帳款追蹤"], "correct": [1], "source": "doc3", "explanation": "正解 b 結算作業。應付帳款管理包含立帳、付款、追蹤這些循環作業。結算屬於期末會計作業，不在 AP 日常步驟內。"}, {"num": 50, "text": "人力資源管理其中的核心觀念之一是將人力視為組織的一項資產，並以長期的角度來培育與發展人才，而其中教育訓練扮演了重要的角色。下列哪些為一個理想的教育訓練計畫應包含的項目？(複選)", "type": "multi", "options": ["設定目標", "實施訓練", "擬定計畫", "評估結果"], "correct": [0, 1, 2, 3], "source": "doc3", "explanation": "正解 a、b、c、d。理想教育訓練計畫包含設定目標、實施訓練、擬定計畫、評估結果，這四項都是必備。"}, {"num": 51, "text": "在人力資源管理方面，大多數的 ERP 系統都將下列何者設為基本配備？", "type": "single", "options": ["薪資管理", "生涯發展", "員工招募", "工作分析"], "correct": [0], "source": "doc3", "explanation": "正解 a 薪資管理。所有 ERP 都會把薪資管理列為 HR 基本配備（最起碼要算薪水）。生涯發展、員工招募、工作分析屬於進階功能。"}, {"num": 52, "text": "下列哪些為企業資源規劃系統中人力資源管理模組的基本功能？(複選)", "type": "multi", "options": ["教育訓練", "績效管理", "組織發展", "考勤管理"], "correct": [0, 1, 2, 3], "source": "doc3", "explanation": "正解 a、b、c、d。HR 模組基本功能涵蓋教育訓練、績效管理、組織發展、考勤管理，這四項都是標準配備。"}, {"num": 53, "text": "在 ERP 系統中，有關客戶主檔的敘述下列何者錯誤？", "type": "single", "options": ["客戶主檔資料包括了客戶基本資料、銷售與財務資料", "可以將客戶分類，以利搜尋", "客戶信用等級或信用額度是屬於客戶基本資料", "客戶基本資料件建立後要定期維護"], "correct": [2], "source": "doc3", "explanation": "正解 c 客戶信用等級或信用額度是屬於客戶基本資料。信用等級和額度屬於「銷售/財務資料」，不是基本資料。基本資料是公司名稱、地址、聯絡方式等。"}, {"num": 54, "text": "同一件產品會因為不同的目的而有不同的物料表（BOM）存在，請問下列何者非 BOM 的類型？", "type": "single", "options": ["工程用 BOM", "計畫用 BOM", "報關用 BOM", "製造用 BOM"], "correct": [2], "source": "doc3", "explanation": "正解 c 報關用 BOM。BOM 類型常見有工程用、計畫用、製造用、成本用、服務用等。報關屬於物流/關務，不是 BOM 的標準類型。"}, {"num": 55, "text": "關於人力資源管理的各項名詞解釋和定義，下列何者較為正確？", "type": "single", "options": ["員工協助主要是指透過較正規化的教育、工作經驗與師徒關係，來幫助員工對未來進行生涯規劃的制度", "薪資是大多數員工加入組織的主要目的之一", "透過員工訓練過程，我們得以對組織的運作及員工個人表現有充分了解，並對組織的經營與管理提供有價值的參考資訊，作為改進各類人事作業及其他功能活動的基礎，強化組織的競爭力", "薪資與福利管理是組織留住人才的唯一憑藉"], "correct": [1], "source": "doc3", "explanation": "正解 b 薪資是大多數員工加入組織的主要目的之一。這是直接事實。a 把員工協助跟生涯規劃混淆，c 把訓練講成評估目的，d 過度誇大薪資是「唯一」憑藉。"}, {"num": 56, "text": "物料需求規劃（MRP）和主生產排程（MPS）在展算順序上的關係是下列何者？", "type": "single", "options": ["先進行 MRP 再進行 MPS", "先進行 MPS 再進行 MRP", "MRP 和 MPS 可以同時進行", "MRP 和 MPS 的進行沒有關係"], "correct": [1], "source": "doc3", "explanation": "正解 b 先 MPS 再 MRP。一定先有主生產排程（決定要做幾個成品），才能用 MRP 展開算物料需求。"}, {"num": 57, "text": "在一般商業慣例上，會因不同的付款時間而給予不同的條件，稱之為下列何者？", "type": "single", "options": ["付款條件", "付款方法", "交貨條件", "付款通知"], "correct": [0], "source": "doc3", "explanation": "正解 a 付款條件。Payment terms 就是因不同付款時間給予不同條件（如 2/10 net 30）。其他三項是不同概念。"}, {"num": 58, "text": "人是企業組織中最有價值的資源，不但是構成組織的基本元素，也是組織中其他資源能否發揮其效益的原動力。人力資源管理包含徵才、選才、用才、育才與留才等五大功能，有關勞資關係是屬於哪一種功能？", "type": "single", "options": ["徵才", "育才", "留才", "用才"], "correct": [2], "source": "doc3", "explanation": "正解 c 留才。勞資關係著重員工權益、合約、福利，這些都跟「留住人才」有關。徵才是入職前、育才是訓練、用才是任用配置。"}, {"num": 59, "text": "關於途程單（routing）的描述，下列哪些正確？(複選)", "type": "multi", "options": ["產品的製造過程會記錄於途程單之中", "途程單記載了產品製造過程中所需要的人力和機器設備", "在執行粗略產能計畫（RCCP）時，可參考途程單來計算主生產排程的可行性", "途程單是以作業（operation）為基本單位來描述產品加工過程"], "correct": [0, 1, 3], "source": "doc3", "explanation": "正解 a、b、d。途程單記載產品製造過程、所需人力與設備、以作業為基本單位描述加工，這三項對。c 錯在 RCCP 是用「資源負荷檔」算粗略產能，不是用途程單。"}, {"num": 60, "text": "經濟訂購量（Economic Order Quantity， EOQ），屬於下列哪些存量管理模式？(複選)", "type": "multi", "options": ["主生產排程（MPS）管理模式", "定量訂購模式", "定期訂購模式", "及時訂購模式"], "correct": [1, 2], "source": "doc3", "explanation": "正解 b、c。EOQ 屬於「定量」訂購模式（每次訂固定量）也用於「定期」模式。MPS 是排程不是存量管理；及時訂購是 JIT 概念。"}, {"num": 61, "text": "在人力資源管理範圍內，下列哪些是屬於績效評估（Performance evaluation）的步驟？(複選)", "type": "multi", "options": ["提供回饋", "決定績效標準", "確認企業目標", "評估績效"], "correct": [0, 1, 3], "source": "doc3", "explanation": "正解 a、b、d。績效評估步驟：決定績效標準→評估績效→提供回饋。「確認企業目標」是更上位的策略規劃，不是績效評估的具體步驟。"}, {"num": 62, "text": "對於以下的敘述，何者有誤？", "type": "single", "options": ["管理會計大致上涵蓋：（1）產品的成本資訊；（2）管理計畫與控制資訊；（3）提供決策資訊；（4）績效衡量等", "管理會計與傳統會計主要區別之處，在於管理會計只注重對成本的數量管理，卻不在意成本的前因後果追蹤", "ERP 系統同樣能夠彌補企業在業務流程中技術與功能不足的缺點", "財務管理的功能主要是對會計作業的數據加以分析，從而進行相對應的預測、管理和控制活動"], "correct": [1], "source": "doc3", "explanation": "正解 b。管理會計除了數量管理也很重視成本的前因後果（如 ABC 作業基礎成本法）。「只注重數量管理不在意前因後果」是錯誤敘述。"}, {"num": 63, "text": "在 ERP 系統資訊內，以下敘述哪些正確？(複選)", "type": "multi", "options": ["物料主檔是以料件（Item）為處理單位", "存貨管理流程主要包括有：派車、採購、收料、庫存管理、發料和出貨等", "計畫用物料表（Planning BOM）包含模組物件表（ModularBOM）、共用件物料表（Common parts BOM）、選配件等", "工程用物料表（Engineering BOM）可說是物料表的基礎"], "correct": [0, 2, 3], "source": "doc3", "explanation": "正解 a、c、d。物料主檔以料件為單位對；計畫用 BOM 包含模組件、共用件、選配件對；工程用 BOM 是基礎對。b 錯在「派車」不在存貨管理流程內。"}, {"num": 64, "text": "有許多研究指出，企業員工離職異動的主要原因，並非薪資福利等有形的報酬，而是在組織中看不到未來升遷的展望。因此，企業在員工生涯發展管理方面必須包含幾項不同的工作項目。下列哪一項工作項目是協助員工了解組織對員工的評價？", "type": "single", "options": ["定義組織各職系和職級的條件", "建立公平公正的績效評估制度", "說明企業未來發展的願景與藍圖", "提供生涯發展規劃輔導"], "correct": [1], "source": "doc3", "explanation": "正解 b 建立公平公正的績效評估制度。績效評估制度讓員工知道組織如何看待他們的表現。其他三項屬於職涯規劃資訊，不是「組織對員工的評價」。"}, {"num": 65, "text": "下列敘述何者為非？", "type": "single", "options": ["損益表呈現企業在某一段期間內經營的成果", "現金流量表是彙總一整個會計週期的現金流量", "資產負債表是表達企業在某一段期間內的財務狀況", "會計恆等式為資產 = 負債 + 股東權益"], "correct": [2], "source": "doc3", "explanation": "正解 c。資產負債表是表達「某一時點」的財務狀況（存量），不是「某一段期間」（流量）。損益表和現金流量表才是期間概念。"}, {"num": 66, "text": "企業為因應內外在環境變化所進行的各種監測與調控的過程，和透過變革管理與其他如工作設計、工作滿意度調查和組織氣候調查等措施，來達成企業發展的目的，這應該較屬於以下人力資源管理內的哪一項？", "type": "single", "options": ["績效管理", "組織發展", "員工協助", "考勤管理"], "correct": [1], "source": "doc3", "explanation": "正解 b 組織發展。組織發展（OD）就是透過變革管理、工作設計、滿意度調查、組織氣候等措施來提升組織健康度。其他三項範圍較窄。"}, {"num": 67, "text": "不論是服務業、買賣業或製造業都有其必須經過的流程，而其流程稱為企業營運的核心，下列何者不是核心流程？", "type": "single", "options": ["接單", "出貨", "收款", "驗收"], "correct": [3], "source": "doc3", "explanation": "正解 d 驗收。買賣業/服務業/製造業共通的核心流程是接單、出貨、收款。「驗收」屬於採購端的細節作業，不是普遍的核心流程。"}, {"num": 68, "text": "以預先指定材料、直接人工和製造費用的標準分攤率，在計算成本時直接使用既定的標準來計算生產成本的方式稱為？", "type": "single", "options": ["責任會計法", "逆溯成本法", "標準成本法", "分批成本法"], "correct": [2], "source": "doc3", "explanation": "正解 c 標準成本法。預先設定材料、人工、製造費用的標準分攤率來計算成本，就是標準成本法。實際成本以後再做差異分析。"}, {"num": 69, "text": "有關固定資產管理的敘述，下列何者為非？", "type": "single", "options": ["製造業的固定資產通常占資產的比重不高", "固定資產的取得有購買、自建和租賃", "將固定資產的成本分攤於受益期間稱為折舊", "固定資產處分的方式主要是報廢"], "correct": [0], "source": "doc3", "explanation": "正解 a。製造業的固定資產（廠房、機器設備）通常占比「高」，不是「不高」。其他三項都是固定資產管理的正確敘述。"}, {"num": 70, "text": "處理客戶銷售退回的收付款相關文件是下列何者？", "type": "single", "options": ["借項通知（Debit Memo）", "貸項通知（Credit Memo）", "出貨通知（Ship Notification）", "付款發票（Invoice）"], "correct": [1], "source": "doc3", "explanation": "正解 b 貸項通知（Credit Memo）。客戶退貨應該退錢回去，所以開貸項通知（減少應收）。Debit Memo 是追加收費用的。"}, {"num": 71, "text": "最近在產業界所流行的一種彈性福利計畫，又被稱為自助式的福利計劃（Cafeteria benefit plan），是指下列何者？", "type": "single", "options": ["指組織綜合各種福利項目，用統一規格方式在員工身上實行", "將福利分為獎金與休假兩種類別，並讓員工自行擇一", "指讓員工從組織所提供的各種福利項目中，自行選擇並組成自己所需要的福利項目", "由員工互相評估，決定是否能享有公司各種福利項目"], "correct": [2], "source": "doc3", "explanation": "正解 c 員工自選福利。Cafeteria benefit plan 比喻像自助餐，員工從組織提供的福利菜單中自己挑搭。"}, {"num": 72, "text": "關於員工薪資中基本薪資的認定，下述何者不應列於其中？", "type": "single", "options": ["職務為基礎的給付", "績效為基礎的給付", "關係為基礎的給付", "能力為基礎的給付"], "correct": [2], "source": "doc3", "explanation": "正解 c 關係為基礎的給付。基本薪資的決定基礎可以是職務、績效、能力，但「關係」（如裙帶）不是合理的薪資基礎。"}, {"num": 73, "text": "下列常見的交貨方式，何者為非？", "type": "single", "options": ["第三方物流", "完全交貨", "分批交貨", "併單交貨"], "correct": [0], "source": "doc3", "explanation": "正解 a 第三方物流。常見交貨方式有完全交貨、分批交貨、併單交貨、訂單合併等。第三方物流（3PL）是「物流模式」不是「交貨方式」。"}, {"num": 74, "text": "基本應收帳款循環通常可分成三大步驟：（1）立帳、（2）收款、（3）沖銷確認，而其目的之敘述下列哪些正確？(複選)", "type": "multi", "options": ["即時提供各式應收帳款的資訊報表，以提供管理者作分析決策之用", "使電腦得以自動開立對帳單，讓稽核人員可隨時追蹤應收帳款目前的收帳情況", "提供各種自動或是人為方式的沖帳作業，以利於會計人員能夠順利的進行沖帳處理", "提供帳齡分析以及迅速反應客戶的信用狀況"], "correct": [0, 1, 2, 3], "source": "doc3", "explanation": "正解 a、b、c、d。應收帳款循環的目的全部都對：提供報表、自動對帳、沖帳作業、帳齡分析與信用反應。"}, {"num": 75, "text": "銷售訂單（Sales Order）是一種契約性的確認協議，用來約定賣方在既定的數量、價格與時間內，將指定的產品或服務運送給買方。下列哪些為銷售訂單的產生方式？(複選)", "type": "multi", "options": ["報價單", "採購單", "合約訂單", "送貨單"], "correct": [0, 2], "source": "doc3", "explanation": "正解 a、c。銷售訂單可由「報價單」轉換或從「合約訂單」展開。採購單是給供應商的、送貨單是出貨後的，都不會產生新的銷售訂單。"}, {"num": 76, "text": "對應客戶對成品需求的急切程度與相關生產的模式，Higgins（1996）等人依據供應鏈中的原材料、零組件、半成品與製成品等項目，區分了各種生產模式下顧客訂單之分歧點（Decoupling Point）。其中哪種型式的生產，其分歧點離供應商最近，而離顧客方最遠？", "type": "single", "options": ["存貨生產（Make to Stock）", "訂單生產（Make to Order）", "訂單組裝（Assembly to Order）", "接單後設計（Engineer to Order）"], "correct": [3], "source": "doc3", "explanation": "正解 d 接單後設計（ETO）。ETO 連設計都接單後做，分歧點最早最深。MTS 分歧點離顧客最近、ATO 居中、ETO 離顧客最遠。"}, {"num": 77, "text": "一般而言，在導入 ERP 系統的各項模組時，通常哪一模組的導入時間會較其他模組為晚？", "type": "single", "options": ["會計與財務模組", "生產與運籌模組", "銷售與配送模組", "人力資源模組"], "correct": [3], "source": "doc3", "explanation": "正解 d 人力資源模組。HR 跟其他模組整合度低、複雜度高（牽涉法規），通常導入時間排在最後或單獨進行。"}, {"num": 78, "text": "ERP 中接觸顧客的先端，並引發後續一連串的產銷活動者，應該是下列哪個功能？", "type": "single", "options": ["客戶信用管理", "訂單管理", "生產規劃", "採購管理"], "correct": [1], "source": "doc3", "explanation": "正解 b 訂單管理。訂單管理是接觸顧客的最前端，後續才會引發採購、生產、出貨、收款等一連串活動。"}, {"num": 79, "text": "驅動整個企業流程運作的根源是下列何者？", "type": "single", "options": ["銷售與配銷模組", "採購模組", "生產規劃與控制模", "組財務會計模組"], "correct": [0], "source": "doc3", "explanation": "正解 a 銷售與配銷模組。SD 模組接到客戶訂單後，才會驅動採購、生產、財務等後續流程，是企業流程的「源頭」。"}, {"num": 80, "text": "下列哪些是當顧客訂單訂購的產品品名、規格、數量與日期輸入完成後，系統便會自動地執行的標準功能？(複選)", "type": "multi", "options": ["可用量查核（Availability Check）", "出貨排程（Delivery Scheduling）", "顧客信用查核（Credit Check）", "出口執照查核（Export License Check）"], "correct": [0, 1, 2, 3], "source": "doc3", "explanation": "正解 a、b、c、d。訂單輸入完成後系統會自動執行：可用量查核、出貨排程、信用查核、出口執照查核，這四項都是標準功能。"}, {"num": 81, "text": "銷售訂單的內容在單據的表頭部份主要是客戶資料，大多數的 ERP系統都會先將客戶資料建檔（客戶主檔），並經查證後給予其信用額度，以作為接單時審查的基礎。下列何者是在客戶資料建立之後必須做的工作？", "type": "single", "options": ["刪除廠商資料", "維護客戶資料", "變更產品資料", "調整庫存數量"], "correct": [1], "source": "doc3", "explanation": "正解 b 維護客戶資料。客戶資料建立後要持續維護（地址、聯絡人、信用變動）。刪廠商、變產品、調庫存都是其他作業。"}, {"num": 82, "text": "企業所辦理的訓練，若依訓練時機區分，下列何者不是？", "type": "single", "options": ["職前訓練", "在職訓練", "職外訓練", "職內訓練"], "correct": [3], "source": "doc3", "explanation": "正解 d 職內訓練。依時機可分為職前訓練（On-boarding）、在職訓練（OJT）、職外訓練（Off-JT）。「職內」不是標準分類用詞。"}, {"num": 83, "text": "關於交貨方式的敘述，下列何者錯誤？", "type": "single", "options": ["訂單合併（Order combination）：將多張訂單轉至同一張交貨文件上", "局部交貨（Partial delivery）：將一張訂單切分為數張不同的交貨文件上", "完全交貨（Complete delivery）：將一張訂單的數量完全地轉置到同一張交貨文件上", "局部交貨（Partial delivery）：將多張訂單切分為數張不同的交貨文件上"], "correct": [3], "source": "doc3", "explanation": "正解 d。Partial delivery 是「將一張訂單切分為數張交貨」（局部交貨），不是「多張訂單切分」。題目把它的定義講錯了。"}, {"num": 84, "text": "銷售資訊系統在 ERP 系統中可列為下列哪一項下之次系統？", "type": "single", "options": ["
