財務資訊系統", "顧客資訊系統", "物流資訊系統", "人力資訊系統"], "correct": [2], "source": "doc3", "explanation": "正解 c 物流資訊系統。銷售資訊系統（SIS）是物流資訊系統（LIS）的次系統之一，因為銷售是物流的下游環節。"}, {"num": 85, "text": "在作生產規劃時，企業可以使用計畫物料表（PBOM）來估計各料件組的需求量，但在實際生產時，每一張製造命令的物料結構必須是確定的。在下列 ERP 供應商的系統中，何者在作需求規劃時並不用模組加以區分？", "type": "single", "options": ["SAP", "鼎新", "Oracle", "IBM"], "correct": [1], "source": "doc3", "explanation": "正解 b 鼎新。SAP、Oracle、IBM 等大型 ERP 在做需求規劃時會用模組件 BOM 來區分；鼎新採取較簡化的作法不需區分。"}, {"num": 86, "text": "在商業會計法（第 47 條）中，規定固定資產的折舊方法包含平均法、定率遞減法、年數合計法、生產數量法、工作時間法或其他經主管機關核定之折舊方法。下列何種方法不是屬於直線折舊法？", "type": "single", "options": ["平均法", "生產數量法", "工作時間法", "定率遞減法"], "correct": [3], "source": "doc3", "explanation": "正解 d 定率遞減法。直線法（每年折舊額相同）包含平均法、生產數量法、工作時間法。定率遞減法每年折舊額會「遞減」，不是直線。"}, {"num": 87, "text": "顧客主檔資料主要是記錄企業所面對顧客的相關資料，其主要包括三項不同的資料結構，以下哪一項不包括？", "type": "single", "options": ["一般性資料（General data）", "產品與服務資料（Product and service）", "公司代碼資料（Company code data）", "銷售與配銷資料（Sales and distribution data）"], "correct": [1], "source": "doc3", "explanation": "正解 b 產品與服務資料。客戶主檔三大資料結構：一般資料、公司代碼資料（財會用）、銷售配銷資料。「產品與服務資料」屬於物料主檔。"}, {"num": 88, "text": "在客戶資料管理中，核定客戶信用額度是一項很重要的工作項目。然而對於客戶信用評估的方式卻有多種，其中 5C 評估法和信用評分法較為常見。下列哪些為 5C 評估法中的因素？(複選)", "type": "multi", "options": ["償債能力（Capability）", "抵押品（Collateral）", "條件（Condition of business）", "信譽（Character）"], "correct": [0, 1, 2, 3], "source": "doc3", "explanation": "正解 a、b、c、d。5C 評估法包括：Character（信譽）、Capability（能力）、Capital（資本）、Collateral（擔保品）、Condition（條件）。題目四項都對。"}, {"num": 89, "text": "下列哪些是 ERP 系統中財務會計作業的主要效益？(複選)", "type": "multi", "options": ["提供整合性的資訊", "提供正確性的資訊", "提供即時性的資訊", "提供分析性的資訊"], "correct": [0, 1, 2], "source": "doc3", "explanation": "正解 a、b、c。財會作業效益是「整合性、正確性、即時性」資訊。「分析性」資訊主要是 BI/管理會計做的事，不是財會主要效益。"}, {"num": 90, "text": "在 ERP 系統中，於長期合約的『計畫採購』內，較不需要明訂下列哪一項工作內容？", "type": "single", "options": ["金額", "產品", "採購訂單", "交期"], "correct": [2], "source": "doc3", "explanation": "正解 c 採購訂單。計畫採購是長期合約形式，需明訂金額、產品、交期。「採購訂單」是按合約執行時才開立的，不需在合約裡明訂。"}, {"num": 91, "text": "工作說明書之內容包含下列哪些項目？(複選)", "type": "multi", "options": ["關係與職責", "工作摘要", "企業組織架構", "績效標準"], "correct": [0, 1, 3], "source": "doc3", "explanation": "正解 a、b、d。工作說明書（Job Description）包含工作摘要、關係與職責、績效標準等。「企業組織架構」是組織層級的事，不在個別工作說明書裡。"}, {"num": 92, "text": "人力資源的工作林林總總，而人力資源管理亦多屬支援其他部門功能／工作的角色。一般而言，人力資源工作通常自下列哪個作業開始？", "type": "single", "options": ["績效評估", "招募訓練", "工作分析", "組織設計"], "correct": [3], "source": "doc3", "explanation": "正解 d 組織設計。HR 工作應該從「組織設計」開始，先設計好組織與職位，才能做工作分析、招募訓練、績效評估。"}, {"num": 93, "text": "在接受客戶訂單後可以在最短時間內滿足客戶需求，但需要對市場需求進行預測的需求反應策略是下列何者？", "type": "single", "options": ["存貨生產（MTS）", "接單後生產（MTO）", "接單後組裝（ATO）", "接單後設計（ETO）"], "correct": [0], "source": "doc3", "explanation": "正解 a 存貨生產（MTS）。MTS 預先生產備庫存，所以接單可立即出貨，前置時間最短。但需要對市場做需求預測。"}, {"num": 94, "text": "企業進行採購時，選擇供應商的考慮因素不包含下列何者？", "type": "single", "options": ["產品供貨能力", "管理制度", "供應商之規模", "技術能力"], "correct": [2], "source": "doc3", "explanation": "正解 c 供應商規模。選擇供應商考慮供貨能力、管理制度、技術能力、品質、價格等。規模本身不是直接因素（小廠也可能很專業）。"}, {"num": 95, "text": "台灣近來有許多新生代實業家，透過網路銷售的訂單確定能力，力求其生產的產品盡可能個人化，亦即其生產的狀況為少量多樣。透過網路與資料庫的運作，除了應快速回應顧客的需求外，另外亦需使製成品的庫存降至最低。除了資訊的基礎建置須健全外，該類公司應採取何種模式來生產以反應相關需求？", "type": "single", "options": ["存貨生產（Make to Stock）", "訂單生產（Make to Order）", "訂單組裝（Assembly to Order）", "訂單設計（Design to Order）"], "correct": [2], "source": "doc3", "explanation": "正解 c 訂單組裝（ATO）。「少量多樣、快速回應、最低庫存」是 ATO 特徵，先做好半成品庫存，接單後再組裝。"}, {"num": 96, "text": "甲公司以 20 萬購入某機器設備，預計可用五年，且每年以 30%為其遞減折舊率，該機器如以定率遞減法計算折舊，則第三年需攤提的折舊金額為多少元？（請四捨五入到小數第二位）", "type": "single", "options": ["6.86 萬元", "4.20 萬元", "2.94 萬元", "9.80 萬元"], "correct": [2], "source": "doc3", "explanation": "正解 c 2.94 萬。定率遞減法 30%：第一年折舊 20×0.3=6 萬，帳面 14；第二年 14×0.3=4.2 萬，帳面 9.8；第三年 9.8×0.3≈2.94 萬。"}, {"num": 97, "text": "薪資管理是合理化釐定、維持與發展薪資制度的一種行政作業。下列哪些不是薪資管理的功能項目？(複選)", "type": "multi", "options": ["退休金管理", "工作滿意度調查", "安全衛生", "福利管理"], "correct": [1, 2], "source": "doc3", "explanation": "正解 b、c。薪資管理功能項目：薪資結構、退休金、福利。「工作滿意度調查」屬於組織發展，「安全衛生」屬於勞工安全，都不是薪資管理範疇。"}, {"num": 98, "text": "企業整體人力資源績效的發揮依賴下列何者？", "type": "single", "options": ["人力資源部門的能力", "事業單位管理者的能力", "人力資源單位與部門及事業單位經理人協同合作", "員工個人的能力"], "correct": [2], "source": "doc3", "explanation": "正解 c 人力資源單位與部門及事業單位經理人協同合作。整體 HR 績效不是 HR 部門自己的事，要靠 HR 跟業務單位主管協作才能發揮。"}, {"num": 99, "text": "企業所辦理的訓練依時機與方式來區分，通常可分為三種。指派主管或老鳥來帶領與指導菜鳥屬於下列何者？", "type": "single", "options": ["職前訓練", "在職訓練", "職能訓練", "職外訓練"], "correct": [1], "source": "doc3", "explanation": "正解 b 在職訓練（OJT）。指派老鳥帶菜鳥就是 On-Job Training 的典型形式，邊做邊學。"}, {"num": 100, "text": "收款程序不包含哪一個作業？", "type": "single", "options": ["開立發票", "收款", "請款", "清算"], "correct": [3], "source": "doc3", "explanation": "正解 d 清算。收款程序包含開立發票、請款、收款、沖帳。「清算」是公司結束營業時的法律程序，不在日常收款流程裡。"}, {"num": 1, "text": "要評估 ERP 系統導入是否成功，除了當初個別公司所設定目標的檢驗以外，還有主要的四個績效指標層次可以使用，請問下列何者不屬於此四項績效指標之一？", "type": "single", "options": ["資訊應用績效", "企業經營績效", "營運作業績效", "系統改造績效"], "correct": [3], "source": "doc4", "explanation": "正解 d 系統改造績效。ERP 導入績效四大指標：系統建置績效、資訊應用績效、營運作業績效、企業經營績效。「系統改造」不是標準的績效指標。"}, {"num": 2, "text": "對於資訊安全的風險評估與管理的敘述，下列何者錯誤？", "type": "single", "options": ["風險評鑑是根據資訊安全管理系統範圍內的資產，評鑑其風險等級", "針對高風險資產做風險處理，降低其風險，使其一旦發生風險時，仍然在可接受範圍內", "評鑑資產風險時，不必進行資產的分類與盤點，只需針對高風險做風險處理，減少不必要的工作", "資訊科技的風險是可以被量化的，唯有量化才能感覺出其重要性"], "correct": [2], "source": "doc4", "explanation": "正解 c。風險評鑑必須先做資產分類盤點才能評估，「不必分類盤點只針對高風險處理」是錯誤觀念，會漏掉重要資產。"}, {"num": 3, "text": "下列哪些是國際上通行的 IT 治理標準？(複選)", "type": "multi", "options": ["COCOMO", "ISO／IEC17799", "ITIL", "PRINCE2"], "correct": [1, 2, 3], "source": "doc4", "explanation": "正解 b、c、d。ISO/IEC 17799（資安）、ITIL（IT 服務管理）、PRINCE2（專案管理）都是國際 IT 治理標準。COCOMO 是軟體成本估算模型，不是治理標準。"}, {"num": 4, "text": "傳統的企業中，往往為了效率提升而將作業程序切割成許多零碎片段，再為了達成整合的目的，再將這些零碎的片段組合回去。從企業流程再造的角度來看，過多不必要的分工將導致手續繁瑣、流程時間變得冗長。因此通常會採用下列何種手法，減少流程時間的浪費？", "type": "single", "options": ["作業程序的取消", "作業的合併", "改為平行作業", "作業的分散"], "correct": [1], "source": "doc4", "explanation": "正解 b 作業的合併。把過度切割的零碎作業合併起來，減少手續銜接的浪費，是 BPR 的常用手法。取消、平行、分散是其他改善方式。"}, {"num": 5, "text": "下列哪些敘述對於 ERP 系統的導入，結合企業流程再造，何者錯誤？", "type": "single", "options": ["可以實現資訊科技的組織績效", "會產生劇烈的組織變革", "需要組織各部門的通力合作", "使 ERP 系統更加符合企業流程"], "correct": [3], "source": "doc4", "explanation": "正解 d 使 ERP 系統更加符合企業流程。BPR 的方向是讓「企業流程符合 ERP 最佳實務」，而不是讓 ERP 來配合企業流程，題目方向寫反了。"}, {"num": 6, "text": "Hammer 和 Champy 所提出的企業流程再造的要素是下列何者？", "type": "single", "options": ["客戶、改變和競爭", "根本、徹底、顯著和流程", "生產、行銷、人事、研發和財務", "策略、管理和作業"], "correct": [1], "source": "doc4", "explanation": "正解 b 根本、徹底、顯著和流程。Hammer 和 Champy 提出 BPR 四要素：Fundamental（根本）、Radical（徹底）、Dramatic（顯著）、Process（流程導向）。"}, {"num": 7, "text": "為加強流程處理之效率、成果、可維護性以及更貼近使用者之需求，亦即改善程式的成本效益，使其更符合使用者的需求，是屬於下列哪一種維護管理活動類型？", "type": "single", "options": ["更正型維護管理活動（Corrective Maintenance）", "調整型維護管理活動（Adaptive Maintenance）", "完備型維護管理活動（Perfective Maintenance）", "持續型維護管理活動(Sustained Maintenance)"], "correct": [2], "source": "doc4", "explanation": "正解 c 完備型維護。Perfective Maintenance 是針對「成本效益、使用者需求」做的功能改善與優化。Corrective 修錯誤、Adaptive 適應環境、Preventive 預防。"}, {"num": 8, "text": "下列何者不是 ERP 系統導入的成功關鍵因素？", "type": "single", "options": ["在訂單旺季時導入", "高階主管的支持", "明確的導入目標", "準備充分的財力"], "correct": [0], "source": "doc4", "explanation": "正解 a 在訂單旺季時導入。旺季導入會干擾正常營運，是大忌。其他三項（高階支持、明確目標、財力充足）才是成功因素。"}, {"num": 9, "text": "有關企業流程管理（Business Process Management， BPM）的敘述，以下哪些正確？(複選)", "type": "multi", "options": ["可透過主從架構（Client-server architecture）整合地域分散的資源以集中控管", "企業變革屬於 BPM 的微觀層次，而流程設計屬於宏觀層次", "企業流程規劃之初，必須先統一定義企業內各種用詞及術語，以利各部門之間的溝通", "應用物件導向方法論（Object-Oriented Methodologies， OOM）是聯結流程設計與 ERP 配置的最佳途徑，能降低導入時間與成本，有益於分析的品質及彈性"], "correct": [0, 2, 3], "source": "doc4", "explanation": "正解 a、c、d。BPM 透過主從架構整合分散資源、流程規劃前先統一術語、用 OOM 連結流程設計與 ERP 配置都對。b 錯在企業變革是「宏觀」、流程設計是「微觀」（題目寫反）。"}, {"num": 10, "text": "下列何者非 ERP 系統導入績效的評估指標？", "type": "single", "options": ["系統建置績效", "資訊應用績效", "營運作業績效", "人員流動比率"], "correct": [3], "source": "doc4", "explanation": "正解 d 人員流動比率。ERP 績效評估指標主要是系統建置、資訊應用、營運作業、企業經營四面向。人員流動率屬於 HR 指標，不是 ERP 績效指標。"}, {"num": 11, "text": "假設某甲公司因為產品設計瑕疵問題，引起國內各大媒體爭相報導，因此預估此負面消息會導致公司財物損失大約為新台幣五千萬元。請問就風險的評量標準來看，甲公司此次的風險評量應屬於以下哪一級分類標準？", "type": "single", "options": ["等級1 輕微", "等級2 嚴重", "等級3 輕微", "等級1 非常嚴重"], "correct": [1], "source": "doc4", "explanation": "正解 b 等級2 嚴重。五千萬損失加全國媒體報導屬於「嚴重」（Major）等級。輕微是小金額，非常嚴重通常是危及公司存續的等級。"}, {"num": 12, "text": "資訊科技（Information Technology， IT）治理協會制定了 IT 治理框架，請問下列哪一項不包含在內？", "type": "single", "options": ["成本的傳遞", "資源管理", "風險管理", "策略的一致性"], "correct": [0], "source": "doc4", "explanation": "正解 a 成本的傳遞。ITGI 的 IT 治理框架五大要素：策略一致性、價值傳遞、資源管理、風險管理、績效衡量。「成本傳遞」不是其中一項（價值傳遞才是）。"}, {"num": 13, "text": "下列敘述何者有誤？", "type": "single", "options": ["企業可先執行 BPR 後，再導入 ERP 系統", "企業可在導入 ERP 系統後，再進行 BPR", "所有使用 ERP 系統的企業，皆必須進行 BPR", "企業可同時進行 BPR 與 ERP 系統的導入"], "correct": [2], "source": "doc4", "explanation": "正解 c。BPR 跟 ERP 可以先後做或同時做，沒有強制關係。「所有 ERP 用戶都必須做 BPR」是過度誇大，題目要找錯的就是這項。"}, {"num": 14, "text": "ERP 系統專案維護階段包含下列哪些項目？(複選)", "type": "multi", "options": ["專案檢討", "維護管理與升級", "專案的後續工作", "資訊安全維護"], "correct": [0, 1, 2], "source": "doc4", "explanation": "正解 a、b、c。ERP 維護階段三項：專案檢討、維護管理升級、後續工作。資訊安全是貫穿全期的考量，不是維護階段的特定項目。"}, {"num": 15, "text": "下列何者不是電腦稽核的目標？", "type": "single", "options": ["保衛資產", "維護資料完整性", "系統的時效性", "系統效率之目標"], "correct": [2], "source": "doc4", "explanation": "正解 c 系統的時效性。電腦稽核四大目標：保衛資產、維護資料完整性、系統效率、系統有效性（達成目標）。「時效性」不是標準目標。"}, {"num": 16, "text": "請問下列何者狀況適用於「繞過電腦查核」（電腦外為審計）？", "type": "single", "options": ["輸入系統的原始資料可以取得，同時其存在的資料格式並非只有機器才有辦法閱讀", "電腦資訊系統具高複雜度，且使用及影響範圍相當廣泛", "查核成本與時間考量", "無原始憑證情況下，查核人員需測試軟體程式，以決定系統控制和處理是可靠正確的"], "correct": [0], "source": "doc4", "explanation": "正解 a。繞過電腦查核（auditing around the computer）適用於原始資料能取得且非機器專屬格式的情況，可直接比對輸入輸出。其他三項複雜系統反而需要 through-the-computer 稽核。"}, {"num": 17, "text": "下列何者非 IT 治理的原則？", "type": "single", "options": ["選擇正確的時間進行 IT 治理設計", "制訂例外處理流程", "基層人員的參與", "為 IT 治理安排所有權和責任"], "correct": [2], "source": "doc4", "explanation": "正解 c 基層人員的參與。IT 治理原則是「高階主管」參與，不是基層人員。其他三項（合宜時機、例外流程、所有權責任）都是治理原則。"}, {"num": 18, "text": "ERP 系統可為企業帶來許多效益，而評估 ERP 系統導入之績效有許多方法。近年來平衡計分卡（BSC）為管理界熱門討論的方法之一，下列哪些為平衡計分卡（BSC）的步驟？(複選)", "type": "multi", "options": ["制定實施計畫", "建立對策略目標的共識", "建立方案的目標與策略", "回饋與學習"], "correct": [0, 1, 2, 3], "source": "doc4", "explanation": "正解 a、b、c、d。BSC 平衡計分卡四步驟：制定實施計畫、建立策略目標共識、建立方案目標策略、回饋與學習，全部都對。"}, {"num": 19, "text": "稽核人員利用人工或電腦系統蒐集證據，以決定委託人電子資料處理系統是否能達成組織目標的過程即為下列何者？", "type": "single", "options": ["電腦稽核", "風險查核", "績效查核", "會計審計"], "correct": [0], "source": "doc4", "explanation": "正解 a 電腦稽核。題目就是電腦稽核（EDP audit）的標準定義：透過蒐集證據判斷 EDP 系統是否達成組織目標。"}, {"num": 20, "text": "下列哪些為 ERP 系統導入後對企業的可能影響結果？(複選)", "type": "multi", "options": ["整合公司資源的應用，以達規模經濟", "整合資訊的擷取更為快速與正確", "簡化企業作業流程、縮短溝通與作業時間", "精確地計算出成本"], "correct": [0, 1, 2, 3], "source": "doc4", "explanation": "正解 a、b、c、d。ERP 導入後的四種影響：資源整合達規模經濟、資訊擷取快速正確、簡化流程縮短時間、精確算出成本，這四項都是公認效益。"}, {"num": 21, "text": "在國際電腦稽核協會（ISACA）的 IT 治理框架中，強調要確保企業和 IT 計劃的連結，使 IT 和企業經營有一致性的行動的是下列何者？", "type": "single", "options": ["策略一致性", "價值的傳遞", "資源管理", "績效的衡量"], "correct": [0], "source": "doc4", "explanation": "正解 a 策略一致性。Strategic Alignment 確保企業策略和 IT 計劃一致，讓 IT 跟營運方向相同。價值傳遞、資源管理、績效衡量是另外三項。"}, {"num": 22, "text": "學者Kurt Lewin 提出組織變革的三部曲，所指的是下列哪些？(複選)", "type": "multi", "options": ["解凍", "變革", "再凍結", "加強溝通"], "correct": [0, 1, 2], "source": "doc4", "explanation": "正解 a、b、c。Lewin 變革三部曲：解凍（Unfreeze）→變革（Change）→再凍結（Refreeze）。加強溝通是變革手段不是階段。"}, {"num": 23, "text": "ISO 國際標準組織眾所周知為世界標準的制定機構。在企業相關領域，如：ISO 14000 為針對企業環境管理所制定的系列標準，而ISO 26000 則是針對企業社會責任的相關準繩。對於 ERP 專案導入與控管過程中，風險管理、資訊安全管理、品質管理與 IT 服務管理可分別對應下列哪四項 ISO 標準？", "type": "single", "options": ["ISO 20000、27001、9000 及 31000", "ISO 27001、31000、9000 及 20000", "ISO 20000、31000、9000 及 27001", "ISO 31000、27001、9000 及 20000"], "correct": [3], "source": "doc4", "explanation": "正解 d ISO 31000、27001、9000 及 20000。風險管理 ISO 31000、資安 ISO 27001、品質 ISO 9000、IT 服務 ISO 20000。"}, {"num": 24, "text": "Hammer 和 Champy 兩位企業流程再造（BPR）大師指出企業唯有從根本重新設計工作流程並創造突破性的改善，才能真正掌握企業成功的關鍵，以應付來自多方面的壓力。下列何者不是壓力之一？", "type": "single", "options": ["顧客", "改變", "競爭", "供應商"], "correct": [3], "source": "doc4", "explanation": "正解 d 供應商。Hammer & Champy 的 3C 壓力是 Customer（顧客）、Change（改變）、Competition（競爭）。供應商不在其中。"}, {"num": 25, "text": "下列何者不屬於『流程分析』必須達成的任務？", "type": "single", "options": ["建模（Modeling）", "監控（Monitoring）", "整合（Integrating）", "修補（Fixing）"], "correct": [3], "source": "doc4", "explanation": "正解 d 修補。流程分析的任務有 Modeling（建模）、Monitoring（監控）、Integrating（整合）、Optimizing（最佳化）。Fixing（修補）不是流程分析的任務。"}, {"num": 26, "text": "企業實施 ERP 資訊系統經常會導致許多的風險產生，而這些風險不僅出現在 ERP 系統中，而是與組織整體營運、文化、人力資源等風險相關。下列哪些為產生風險的項目？(複選)", "type": "multi", "options": ["職責集中化", "交易由電腦自動產生或執行", "通訊系統或伺服器的損壞", "缺乏交易軌跡"], "correct": [0, 1, 2, 3], "source": "doc4", "explanation": "正解 a、b、c、d。ERP 引發的風險有：職責集中化（少數人有大權限）、自動交易、伺服器故障、缺乏交易軌跡，這四項都是常見風險。"}, {"num": 27, "text": "學者列溫（Kurt Lewin）提出的組織變革三部曲的順序為何？", "type": "single", "options": ["凍結 → 變革 → 解凍", "變革 → 凍結 → 解凍", "解凍 → 變革 → 再凍結", "解凍 → 再凍結 → 變革"], "correct": [2], "source": "doc4", "explanation": "正解 c 解凍 → 變革 → 再凍結。Lewin 三部曲標準順序，先打破現狀（解凍），再做變革，最後讓新狀態穩定下來（再凍結）。"}, {"num": 28, "text": "ERP 專案大多為企業型的專案，僅有極少部分為就某些 IT 需求而做部分調整更動的作法。若 ERP 專案為企業型專案，那麼專案目標的訂定就極為重要。下列訂定專案目標的要點中，哪些是正確的？(複選)", "type": "multi", "options": ["清楚且簡單易懂", "意涵宜深遠，包含項目愈完整愈多愈好", "最好可以量測或有具象的標準或目標得以比對", "可以評估成本效益且可實現"], "correct": [0, 2, 3], "source": "doc4", "explanation": "正解 a、c、d。專案目標要清楚簡單、可量測、可評估成本效益且可實現（SMART 原則）。b 錯在「包含愈多愈好」反而會失焦，目標應該聚焦。"}, {"num": 29, "text": "下列有關 ERP 系統專案的後續工作的敘述何者是錯誤的？", "type": "single", "options": ["須執行系統效益評估", "須檢視系統的資訊安全", "須進行系統的稽核工作", "ERP 系統專案的正式上線，即宣告專案結束"], "correct": [3], "source": "doc4", "explanation": "正解 d ERP 系統正式上線即宣告專案結束。錯誤觀念，上線只是開始，後續還有效益評估、資安檢視、稽核工作要做。"}, {"num": 30, "text": "下列何者非 Hammer 與 Champy 所提出的 BPR 四大要素？", "type": "single", "options": ["組織學習", "根本", "徹底", "戲劇性"], "correct": [0], "source": "doc4", "explanation": "正解 a 組織學習。Hammer & Champy 的 BPR 四要素：根本（Fundamental）、徹底（Radical）、顯著/戲劇性（Dramatic）、流程（Process）。組織學習是另一回事。"}, {"num": 31, "text": "企業流程再造有其必要但其收效未必如預期的遠大，BPR 學者立意甚佳卻也因其倡言的門檻甚高而令企業裹足不前。所幸近來資訊技術與網路科技的高度發展，漸次得以減抑若干 BPR 工作的困難程度。透過現場填入部分資料，以及爾後網路修改並新增其他資料，並配合協同合作的運行由其他人／部門增益與審核修正此項資料，最後讓資料逐漸完整，如此的過程猶如 BPR 常用的五種流程改善方式中的何者？", "type": "single", "options": ["作業的合併", "作業程序的取消", "作業的分散", "作業的抽離"], "correct": [2], "source": "doc4", "explanation": "正解 c 作業的分散。題目描述「現場填部分→其他人/部門陸續修改新增→協同合作完成」就是把一個作業拆給多個人/時間點協作完成，這就是「作業的分散」。"}, {"num": 32, "text": "針對數種電腦輔助稽核的作法，其中繞過電腦的稽核，僅確認輸入出資料是否與預期吻合的作法，往往常為以下哪種稽核狀況所用？", "type": "single", "options": ["內部稽核", "外部稽核", "抽驗稽核", "組織稽核"], "correct": [1], "source": "doc4", "explanation": "正解 b 外部稽核。繞過電腦稽核只看輸入輸出對不對，常用於外部稽核（如會計師查帳），因為外部稽核師通常不深入了解內部系統。"}, {"num": 1, "text": "下列哪一項不是商業智慧（Business Intelligence）之特色？", "type": "single", "options": ["結構化資料", "以資料庫或資料倉儲來儲存", "全文檢索、規則比對", "特定圖表"], "correct": [2], "source": "doc5", "explanation": "正解 c 全文檢索、規則比對。BI 特色是結構化資料、用資料庫/資料倉儲儲存、特定圖表分析。「全文檢索、規則比對」是知識管理（KM）或搜尋引擎的特徵。"}, {"num": 2, "text": "下列敘述哪些正確？(複選)", "type": "multi", "options": ["顧客關係管理（CRM）= 資訊科技 + 銷售活動", "知識創造的種類有社會化（socialization）、整合化（combination）、外部化（externalization）和內部化（internalization）", "資料探勘、線上分析處理、深層分析（drill down）與平衡計分卡是常見的商業智慧工具", "產品生命週期管理的功能包括了產品結構管理、零組件與組態管理、工作流程與程序管理、文件管理、產品發展專案排程管理以及資料安全管理"], "correct": [1, 2, 3], "source": "doc5", "explanation": "正解 b、c、d。Nonaka 的 SECI 知識創造模型對；BI 工具包括資料探勘、OLAP、drill down、BSC 對；PLM 功能包括結構管理、組態、流程、文件等對。a 把 CRM 簡化成「IT+銷售」太狹隘。"}, {"num": 3, "text": "知識管理（Knowledge Management， KM）包含以下四個程序，請選出正確順序者？ 1. 知識擴散、2. 知識轉換、3. 知識應用、4.知識獲得", "type": "single", "options": ["4231", "4321", "4213", "4312"], "correct": [2], "source": "doc5", "explanation": "正解 c 4213。KM 標準四程序順序：知識獲得→知識轉換→知識擴散→知識應用，先得到、轉化成可用形式、再傳出去、最後應用。"}, {"num": 4, "text": "依據 Arthur Andersen 的企業 E 化四部曲，ERP 系統的導入是在哪一個階段？", "type": "single", "options": ["E 化萌芽期", "E 化導入期", "E 化整合期", "全面 E 化期"], "correct": [1], "source": "doc5", "explanation": "正解 b E 化導入期。Arthur Andersen 四部曲：萌芽期（基礎建設）、導入期（ERP/CRM 等核心系統）、整合期、全面 E 化期。ERP 屬於導入期。"}, {"num": 5, "text": "在企業電子化各種系統中，哪一種應用的核心是企業對企業（B2B），下列何者正確？", "type": "single", "options": ["供應鏈管理", "顧客關係管理", "資料倉儲", "知識管理"], "correct": [0], "source": "doc5", "explanation": "正解 a 供應鏈管理。SCM 連結企業之間（供應商↔企業↔通路），核心就是 B2B 應用。CRM 是 B2C，DW/KM 是內部用。"}, {"num": 6, "text": "目前企業電子化的重點除在 ERP（企業資源規劃）外，主要著重在四個方面：SCM、CRM、KM 和 BI，關於以下四點的敘述，哪一項是錯誤的？", "type": "single", "options": ["SCM：整合採購、生產和顧客服務的整合流程，以提供顧客相關產品及服務的採購、生產和配送等活動", "KM：具備智慧型內容的共同資訊存取平台，並針對組織性的知識進行個人化及可攜式存取的單一定點", "CRM：強調顧客與企業間流程之自動化，以做到一對一的行銷", "BI：包含資料倉儲、線上分析處理以及資料探勘的技術架構，用以調整企業營運策略方針的輔助工具"], "correct": [1], "source": "doc5", "explanation": "正解 b。題目寫的 KM 描述其實是 EIP（企業資訊入口）的特徵：智慧型內容、共同存取平台、個人化單一入口。KM 的重點應該是知識的萃取、分享、應用而不是入口平台。"}, {"num": 7, "text": "下列對於 ERP II 的敘述，何者不正確？", "type": "single", "options": ["ERP II 包含許多系統，如顧客關係管理、供應鏈管理、商業智慧…等", "ERP II 為一個企業策略和一組特定產業領域專屬的應用系統", "從內部產生和使用的資料，變成內、外部共享的資料", "應用領域僅限於製造業中，其他領域的產業並不適用"], "correct": [3], "source": "doc5", "explanation": "正解 d 應用領域僅限於製造業。ERP II 的應用領域反而從製造擴展到「跨產業」（特定產業、產業部門及跨產業），不是限於製造業。"}, {"num": 8, "text": "下列何者不屬於第二代企業資源規劃的範疇？", "type": "single", "options": ["SCM", "BI", "TOC", "CRM"], "correct": [2], "source": "doc5", "explanation": "正解 c TOC。ERP II 範疇包括 SCM、CRM、BI、KM、PLM 等。TOC（限制理論）是 Goldratt 的生產管理理論，不算 ERP II 模組。"}, {"num": 9, "text": "下列何者為正確的知識管理（KM）程序？", "type": "single", "options": ["知識獲得 → 知識轉換 → 知識擴散 → 知識應用", "知識應用 → 知識獲得 → 知識轉換 → 知識擴散", "知識擴散 → 知識應用 → 知識獲得 → 知識轉換", "知識獲得 → 知識轉換 → 知識應用 → 知識擴散"], "correct": [0], "source": "doc5", "explanation": "正解 a 知識獲得→轉換→擴散→應用。標準 KM 四程序順序，先取得知識，再轉化、傳播、實際應用。"}, {"num": 10, "text": "下列有關供應鏈管理（SCM）的敘述哪些是正確的？(複選)", "type": "multi", "options": ["供應鏈操作參考模型（SCOR）將組織分成五個商業流程，分別是計劃、資源、製造、運送與回收", "SCM 供應商所提供的產品都包含供應鏈規劃與供應鏈執行", "在 SCM 中，是以協同規劃來解決長鞭效應的問題，進而對整個供應鏈的資源做最佳的安排，以提高總體存貨水準", "先進規劃排程是以無限產能的觀點來進行生產排程"], "correct": [0, 1], "source": "doc5", "explanation": "正解 a、b。SCOR 五大商業流程（計劃、資源、製造、運送、回收）對；SCM 同時包含規劃與執行對。c 錯在協同規劃應該是「降低」總體存貨水準，d 錯在 APS 是「有限」產能規劃不是無限。"}, {"num": 11, "text": "企業 E 化程度主要分為四個階段：E 化萌芽期、E 化導入期、E化整合期、全面 E 化期，以下哪一項 E 化項目不屬於在第二階段的 E 化導入期內？", "type": "single", "options": ["網站設置", "ERP 系統導入", "初期建構知識庫", "初步導入線上交易"], "correct": [0], "source": "doc5", "explanation": "正解 a 網站設置。網站設置是「萌芽期」的工作（基礎建設）。導入期重點是 ERP 系統、知識庫初建、線上交易這些核心系統。"}, {"num": 12, "text": "資料倉儲（data warehouse）具有主題導向、整合性、時間變動性與非揮發性等四種特性。以上四種特性中何者為當資料放到資料倉儲中後，不再隨著時間變化而有異動、修正或更新的唯讀（read only）性質？", "type": "single", "options": ["時間變動性", "非揮發性", "整合性", "主題導向"], "correct": [1], "source": "doc5", "explanation": "正解 b 非揮發性。Nonvolatile 指資料一旦進入資料倉儲就「不再變動、只能讀取」，這就是 read-only 性質。其他三項（時間變動性、整合性、主題導向）是不同特性。"}, {"num": 13, "text": "電子化企業常有舊系統與新導入系統間的介接整合，業界常用的方式係針對不同功能間會存取的資料格式做一轉換抑或是撰寫兩者間的介接程式以達成目的。此類的做法通常被歸屬於下列何者？", "type": "single", "options": ["ASP（Application Services Provider）", "EAI（Enterprise Application Integration）", "MDM（Master Data Management）", "BPM（Business Process Management）"], "correct": [1], "source": "doc5", "explanation": "正解 b EAI（企業應用整合）。針對舊新系統間做資料格式轉換或撰寫介接程式，就是 EAI 的典型工作。ASP 是租賃軟體服務、MDM 是主檔管理、BPM 是流程管理。"}, {"num": 14, "text": "平衡計分卡常運用在何系統模組中作為提供管理工具？", "type": "single", "options": ["顧客關係管理（CRM）", "商業智慧（BI）", "供應鏈管理（SCM）", "資料倉儲（DW）"], "correct": [1], "source": "doc5", "explanation": "正解 b 商業智慧（BI）。平衡計分卡（BSC）是策略管理工具，常被嵌在 BI 系統裡作為儀表板和績效衡量工具。"}, {"num": 15, "text": "下列何者非資料倉儲（data warehouse）所擁有的特性？", "type": "single", "options": ["主題導向", "整合性", "時間變動性", "可揮發性"], "correct": [3], "source": "doc5", "explanation": "正解 d 可揮發性。資料倉儲是「非揮發性」（Nonvolatile），不是「可揮發性」。其他三項（主題導向、整合性、時間變動性）都是 DW 標準特性。"}, {"num": 16, "text": "顧客關係管理系統（CRM）必須被看成哪三者合為一體的整合？", "type": "single", "options": ["人員、企業流程、系統", "企業、客戶、供應商", "人力、財力、物力", "資料、資訊、系統"], "correct": [0], "source": "doc5", "explanation": "正解 a 人員、企業流程、系統。CRM 不只是軟體，要 People + Process + System 三者整合才能成功，缺一不可。"}, {"num": 17, "text": "顧客關係管理（CRM）就其運行方式通常分成三種型態，這三種型態是指下列何者？", "type": "single", "options": ["操作型、分析型與知識型", "操作型、分析型與協同型", "分析型、知識型與協同型", "操作型、知識型與協同型"], "correct": [1], "source": "doc5", "explanation": "正解 b 操作型、分析型與協同型。CRM 三型態：Operational（自動化前線作業）、Analytical（分析顧客資料）、Collaborative（多通路協同）。"}, {"num": 18, "text": "根據全球供應鏈論壇（GSCF）定義：供應鏈是指從原料供應商到顧客一連串提供為顧客加值的產品、服務和資訊流程的整合。供應鏈管理（SCM）主要是以數量技巧來處理供應鏈系統上的主要決策，下列哪些為主要決策項目？(複選)", "type": "multi", "options": ["位置", "生產", "存貨", "運輸"], "correct": [0, 1, 2, 3], "source": "doc5", "explanation": "正解 a、b、c、d。SCM 主要決策四項：位置（設廠/倉庫位置）、生產（量與時程）、存貨（水準）、運輸（模式路線），全部都對。"}, {"num": 19, "text": "美國研究機構 Gartner Group 定義 ERP II 為一個企業策略和一組特定產業領域專屬的應用資訊系統，並拿 ERP II 和 ERP 比較，列出六大特性：角色、領域、功能、程序、架構與資料。從傳統的製造、配銷和財務會計，擴張到包含特定產業、產業部門及跨產業的資訊處理是屬於何種特性？", "type": "single", "options": ["架構", "角色", "功能", "領域"], "correct": [2], "source": "doc5", "explanation": "正解 c 功能。從製造配銷財會擴張到特定產業、跨產業，這是 ERP II「功能」面向的擴張。架構是技術面、角色是定位、領域是市場面。"}, {"num": 20, "text": "ERP II 的解釋常從兩個典型的觀點言之，一是 Charles Moller的 ERP II 概念框架，另一則是較常見的 Gartner 公司的說法。根據 Gartner 的說法，ERP II 簡言之是指下列何者？", "type": "single", "options": ["電子商務", "協同商務", "網路商務", "行動商務"], "correct": [1], "source": "doc5", "explanation": "正解 b 協同商務。Gartner 把 ERP II 簡稱為「協同商務」（Collaborative Commerce, c-Commerce），強調企業間的協作。"}, {"num": 21, "text": "下列對於產業資訊電子化的敘述，哪些正確？(複選)", "type": "multi", "options": ["企業電子化為一企業應用整合性資訊系統規劃與執行關於採購、生產、銷售及服務等前台與內部的作業", "電子化企業其所涉及之領域包括電子交易以及徹底利用電子設備重新界定自身經營模式，以創造顧客價值", "SCM 為針對自供應商到顧客的整體流程，規劃、執行與控制有關物流、資訊流、金流的各種活動，進而與其他跨供應階層的企業成員統合為自原料到最終產品的價值鏈", "電子商務為一企業利用通訊網路對消費者（B2C）以及對其他企業傳遞資訊、銷售商品或提供服務"], "correct": [0, 1, 2, 3], "source": "doc5", "explanation": "正解 a、b、c、d。企業電子化定義、電子化企業範疇、SCM 定義、電子商務定義，四項敘述都正確。"}, {"num": 22, "text": "下列有關於顧客關係管理系統之敘述何者正確？", "type": "single", "options": ["一個完整的顧客關係管理系統至少包含三個部分，前端使用者介面、中間顧客關係管理活動的支援與後端顧客關係資料的管理", "前端顧客接觸主要包含了行銷、銷售與服務", "中端顧客關係活動主要包括資料倉儲、資料探勘與線上即時分析處理", "後端顧客關係資料管理包含客服中心、網站、傳真以及 PDA"], "correct": [0], "source": "doc5", "explanation": "正解 a。完整 CRM 包含三部分：前端使用者介面、中間活動支援、後端資料管理，這個分法對。b 把行銷銷售服務歸前端是錯的（那是中端活動），c、d 也都把層級講錯了。"}, {"num": 23, "text": "供應鏈管理（SCM）就功能面而言，通常包括計劃、採購（資源）、製造、配送（運送）、退貨（回收）五大基本商業流程。其中具有高度策略意味的環節應在於下列何者？", "type": "single", "options": ["計劃", "採購", "製造", "退貨"], "correct": [0], "source": "doc5", "explanation": "正解 a 計劃。SCOR 五大流程裡，「計劃」（Plan）跨越所有環節，具有最高的策略意味，決定了採購、製造、配送、退貨的整體方向。"}, {"num": 24, "text": "一個完整的顧客關係管理系統至少包含前端、中間與後端等三個部分，下列何者不屬於前述的部分？", "type": "single", "options": ["使用者介面", "顧客關係活動的支援", "顧客關係資料的管理", "供應鏈的供貨行為"], "correct": [3], "source": "doc5", "explanation": "正解 d 供應鏈的供貨行為。CRM 三部分是前端（介面）、中間（活動支援）、後端（資料管理）。供應鏈供貨是 SCM 的事，不是 CRM。"}, {"num": 25, "text": "依據 Inmon 的看法，基本上資料倉儲應該具有哪些特性？(複選)", "type": "multi", "options": ["主題導向（Subject Oriented）", "整合性（Integrated）", "非揮發性（Nonvolatile）", "時間變動性（Time Variant）"], "correct": [0, 1, 2, 3], "source": "doc5", "explanation": "正解 a、b、c、d。Inmon 對資料倉儲的四大特性定義：主題導向、整合性、非揮發性、時間變動性，這就是經典的四項特性，全部都對。"}];

function init() {
  // Theme
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) document.body.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = document.body.getAttribute('data-theme');
    let next;
    if (!cur) {
      // currently following system; flip to opposite of system
      const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      next = sysDark ? 'light' : 'dark';
    } else {
      next = cur === 'dark' ? 'light' : 'dark';
    }
    document.body.setAttribute('data-theme', next);
    localStorage.setItem(THEME_KEY, next);
  });

  // Default chapters: any source we actually have
  const present = [...new Set(QUESTIONS.map(q => q.source))];
  state.config.chapters = present.slice();

  renderHome();
}

function shuffle(a) {
  const r = a.slice();
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}
function arrEq(a, b) {
  if (a.length !== b.length) return false;
  const sa = a.slice().sort((x, y) => x - y);
  const sb = b.slice().sort((x, y) => x - y);
  return sa.every((v, i) => v === sb[i]);
}
function fmtTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}
function fmtDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}
function saveHistory(rec) {
  const h = getHistory();
  h.unshift(rec);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 100)));
}
function clearHistory() {
  if (confirm('確定要清除所有紀錄嗎?')) {
    localStorage.removeItem(HISTORY_KEY);
    renderHome();
  }
}
function describeMode(cfg) {
  if (cfg.mode === 'full') return '全部';
  if (cfg.mode === 'random') return `隨機 ${cfg.n} 題`;
  if (cfg.mode === 'chapter') {
    const names = cfg.chapters.map(c => SOURCE_LABELS[c]?.short || c).join('+');
    return `章節 ${names}`;
  }
  if (cfg.mode === 'wrong-retry') return '錯題重練';
  return cfg.mode;
}

// ============ Start Quiz ============
function startQuiz() {
  let pool = [];
  const cfg = state.config;
  if (cfg.mode === 'full') {
    pool = QUESTIONS.slice();
  } else if (cfg.mode === 'random') {
    pool = shuffle(QUESTIONS).slice(0, cfg.n);
  } else if (cfg.mode === 'chapter') {
    if (cfg.chapters.length === 0) {
      alert('請至少選一個章節');
      return;
    }
    pool = QUESTIONS.filter(q => cfg.chapters.includes(q.source));
    if (cfg.subMode === 'rand') {
      const n = parseInt(document.getElementById('chapterN').value, 10) || 20;
      pool = shuffle(pool).slice(0, n);
    } else {
      pool = shuffle(pool); // randomize order even on "all"
    }
  }
  if (pool.length === 0) {
    alert('題目為空');
    return;
  }
  state.pool = pool;
  state.idx = 0;
  state.answers = [];
  state.startAt = Date.now();
  state.feedback = false;
  renderQuestion();
}

// ============ Quiz Screen ============
let pickState = []; // current selection (array of indices)

function renderQuestion() {
  state.screen = 'quiz';
  state.feedback = false;
  pickState = [];
  const q = state.pool[state.idx];
  const total = state.pool.length;
  const pct = (state.idx / total) * 100;

  const tagMulti = q.type === 'multi'
    ? `<span class="qmeta-tag multi">複選</span>`
    : `<span class="qmeta-tag">單選</span>`;
  const tagSrc = `<span class="qmeta-tag">${SOURCE_LABELS[q.source]?.short || q.source}</span>`;
  const tagOrig = q.num ? `<span class="qmeta-tag">原 #${q.num}</span>` : '';

  $main.innerHTML = `
    <div class="progress-wrap fade-in">
      <div class="progress-meta">
        <span>${state.idx + 1} / ${total}</span>
        <span>${describeMode(state.config)}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="qcard fade-in">
      <div class="qmeta">${tagMulti}${tagSrc}${tagOrig}</div>
      <p class="qtext">${escapeHtml(q.text)}</p>
      ${q.diagram ? `<div class="q-diagram-wrap">${q.diagram}</div>` : ''}
      <div class="options" id="options">
        ${q.options.map((o, i) => `
          <button class="opt" data-i="${i}">
            <span class="opt-letter">${LETTERS[i]}.</span>
            <span class="opt-text">${escapeHtml(o)}</span>
            <span class="opt-icon"></span>
          </button>
        `).join('')}
      </div>
      <div id="feedback"></div>
      <div class="qactions">
        <span class="qactions-left" id="qhint">${q.type === 'multi' ? '可以複選' : '單選'}</span>
        <button class="btn" id="primaryBtn" disabled>確認</button>
      </div>
    </div>
  `;

  const optEls = document.querySelectorAll('.opt');
  optEls.forEach(el => {
    el.addEventListener('click', () => {
      if (state.feedback) return;
      const i = parseInt(el.dataset.i, 10);
      if (q.type === 'single') {
        pickState = [i];
        optEls.forEach(e => e.classList.toggle('selected', parseInt(e.dataset.i, 10) === i));
      } else {
        const idx = pickState.indexOf(i);
        if (idx >= 0) pickState.splice(idx, 1);
        else pickState.push(i);
        el.classList.toggle('selected');
      }
      document.getElementById('primaryBtn').disabled = pickState.length === 0;
    });
  });
  document.getElementById('primaryBtn').addEventListener('click', onPrimary);
}

function onPrimary() {
  if (!state.feedback) {
    submitAnswer();
  } else {
    advance();
  }
}

function submitAnswer() {
  const q = state.pool[state.idx];
  const correct = arrEq(pickState, q.correct);
  state.answers.push({ picked: pickState.slice(), correct, q });
  state.feedback = true;

  // Update option styles
  document.querySelectorAll('.opt').forEach(el => {
    const i = parseInt(el.dataset.i, 10);
    const picked = pickState.includes(i);
    const isCorrect = q.correct.includes(i);
    el.classList.remove('selected');
    el.setAttribute('disabled', '');
    el.querySelector('.opt-icon').textContent = '';
    if (picked && isCorrect) {
      el.classList.add('correct');
      el.querySelector('.opt-icon').textContent = '✓';
    } else if (picked && !isCorrect) {
      el.classList.add('wrong');
      el.querySelector('.opt-icon').textContent = '✗';
    } else if (!picked && isCorrect) {
      el.classList.add('correct-missed');
      el.querySelector('.opt-icon').textContent = '✓';
    }
  });

  // Feedback box
  const fb = document.getElementById('feedback');
  const explainHtml = q.explanation
    ? `<div class="explain"><span class="explain-label">詳解</span>${escapeHtml(q.explanation)}</div>`
    : '';
  if (correct) {
    fb.innerHTML = `<div class="feedback right"><strong>答對。</strong>`+
      `${q.type === 'multi' ? `正解 ${q.correct.map(i => LETTERS[i]).join('、')}` : `正解 ${LETTERS[q.correct[0]]}`}</div>` +
      explainHtml;
  } else {
    fb.innerHTML = `<div class="feedback wrong"><strong>答錯。</strong>` +
      `正解 ${q.correct.map(i => LETTERS[i]).join('、')}` +
      (q.type === 'multi' ? `（複選需全部選對）` : '') +
      `</div>` +
      explainHtml;
  }

  document.getElementById('qhint').textContent = correct ? '繼續下一題' : '看清楚正解再繼續';
  const btn = document.getElementById('primaryBtn');
  btn.disabled = false;
  btn.textContent = state.idx + 1 < state.pool.length ? '下一題 →' : '看結果';
}

function advance() {
  state.idx++;
  if (state.idx >= state.pool.length) {
    endQuiz();
  } else {
    renderQuestion();
  }
}

// ============ Result Screen ============
function endQuiz() {
  state.screen = 'result';
  state.endAt = Date.now();
  const dur = Math.round((state.endAt - state.startAt) / 1000);
  const total = state.pool.length;
  const correct = state.answers.filter(a => a.correct).length;
  const pct = Math.round(correct / total * 100);

  // Save history
  saveHistory({
    ts: state.endAt,
    score: correct,
    total,
    duration: dur,
    mode: describeMode(state.config),
  });

  const wrong = state.answers.filter(a => !a.correct);
  const tier = pct >= 80 ? 'good' : pct >= 60 ? 'mid' : 'bad';
  const tierMsg = pct === 100 ? '滿分。' : pct >= 80 ? '不錯。' : pct >= 60 ? '還可以。' : '需要再練。';

  $main.innerHTML = `
    <div class="fade-in">
      <div class="result-hero">
        <div class="result-eyebrow">${tierMsg}</div>
        <div class="result-score ${tier === 'good' ? 'good' : ''}">${pct}<span style="font-size:.5em;color:var(--ink-3)">%</span></div>
        <div class="result-fraction">${correct} / ${total}</div>
        <div class="result-meta">
          <div class="result-meta-item">
            <div class="result-meta-label">用時</div>
            <div class="result-meta-value num">${fmtTime(dur)}</div>
          </div>
          <div class="result-meta-item">
            <div class="result-meta-label">答對</div>
            <div class="result-meta-value num">${correct}</div>
          </div>
          <div class="result-meta-item">
            <div class="result-meta-label">答錯</div>
            <div class="result-meta-value num">${wrong.length}</div>
          </div>
          <div class="result-meta-item">
            <div class="result-meta-label">範圍</div>
            <div class="result-meta-value">${describeMode(state.config)}</div>
          </div>
        </div>
      </div>

      <div class="btn-row">
        ${wrong.length ? `<button class="btn" id="retryWrong">錯題重練 (${wrong.length} 題)</button>` : ''}
        <button class="btn btn-ghost" id="redo">再做一次</button>
        <button class="btn btn-ghost" id="goHome">回主頁</button>
      </div>

      ${wrong.length ? `
        <div class="review-section">
          <h2 class="section-title">
            <span>錯題回顧</span>
            <span class="section-title-aux">${wrong.length} items</span>
          </h2>
          ${wrong.map((a, i) => `
            <div class="review-item">
              <div class="review-meta">
                <span>#${i + 1}</span>
                <span>${SOURCE_LABELS[a.q.source]?.short || a.q.source}</span>
                <span>${a.q.type === 'multi' ? '複選' : '單選'}</span>
                ${a.q.num ? `<span>原 #${a.q.num}</span>` : ''}
              </div>
              <div class="review-q">${escapeHtml(a.q.text)}</div>
              ${a.q.diagram ? `<div class="q-diagram-wrap">${a.q.diagram}</div>` : ''}
              ${a.q.options.map((o, j) => {
                const picked = a.picked.includes(j);
                const isCorrect = a.q.correct.includes(j);
                let css = '';
                let icon = '';
                if (picked && !isCorrect) { css = 'wrong'; icon = '✗'; }
                else if (isCorrect) { css = picked ? 'correct' : 'correct-missed'; icon = '✓'; }
                else { css = ''; icon = ''; }
                return `<div class="opt ${css}" disabled style="cursor:default">
                  <span class="opt-letter">${LETTERS[j]}.</span>
                  <span class="opt-text">${escapeHtml(o)}</span>
                  <span class="opt-icon">${icon}</span>
                </div>`;
              }).join('')}
              ${a.q.explanation ? `<div class="explain" style="margin-top:14px"><span class="explain-label">詳解</span>${escapeHtml(a.q.explanation)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      ` : `
        <div class="review-section">
          <div class="history-empty" style="border-color:var(--accent);color:var(--accent)">全對。沒什麼好回顧的，繼續下一輪。</div>
        </div>
      `}
    </div>
  `;

  if (wrong.length) {
    document.getElementById('retryWrong').addEventListener('click', () => {
      state.pool = wrong.map(a => a.q);
      state.idx = 0;
      state.answers = [];
      state.startAt = Date.now();
      state.feedback = false;
      // mark mode for display only
      state.config = { ...state.config, mode: 'wrong-retry' };
      renderQuestion();
    });
  }
  document.getElementById('redo').addEventListener('click', startQuiz);
  document.getElementById('goHome').addEventListener('click', renderHome);
}

// ============ utils ============
function escapeHtml(s) {
  return String(s)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

// keyboard shortcut: Enter to advance after feedback
document.addEventListener('keydown', e => {
  if (state.screen === 'quiz' && e.key === 'Enter') {
    const btn = document.getElementById('primaryBtn');
    if (btn && !btn.disabled) btn.click();
  }
});

init();
</script>
</body>
</html>
